    <!-- Estilos Globales y Temas -->
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --secondary-color: #a855f7;
            --grid-color: rgba(255, 255, 255, 0.05);
            --border-color: #334155;
            --shadow: 0 10px 40px rgba(0,0,0,0.5);
            --backdrop: blur(12px);
            --highlight-yellow: rgba(250, 204, 21, 0.2);
            --highlight-green: rgba(74, 222, 128, 0.3);
            --panel-bg: rgba(30, 41, 59, 0.85);
            --option-bg: #1e293b;
            --option-color: #ffffff;
        }

        .theme-light {
            --bg-color: #f8fafc; --surface-color: #ffffff; --text-color: #0f172a; --accent-color: #2563eb;
            --secondary-color: #7e22ce; --grid-color: rgba(0, 0, 0, 0.05); --border-color: #e2e8f0;
            --shadow: 0 10px 40px rgba(0,0,0,0.08); --highlight-yellow: rgba(250, 204, 21, 0.4);
            --highlight-green: rgba(74, 222, 128, 0.5); --panel-bg: rgba(255, 255, 255, 0.95);
            --option-bg: #ffffff; --option-color: #000000;
        }

        .theme-glass {
            --bg-color: #09090e;
            background-image: radial-gradient(at 0% 0%, hsla(253, 50%, 15%, 1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225, 60%, 20%, 1) 0, transparent 50%);
            --surface-color: rgba(255, 255, 255, 0.08); --text-color: #ffffff; --accent-color: #60a5fa; --secondary-color: #f472b6;
            --border-color: rgba(255, 255, 255, 0.15); --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); --backdrop: blur(16px);
            --panel-bg: rgba(20, 25, 40, 0.7); --option-bg: #1a1a2e;
        }

        .theme-neon {
            --bg-color: #000000; --surface-color: #0a0a0a; --text-color: #ffffff; --accent-color: #00ffff;
            --secondary-color: #ff00ff; --grid-color: rgba(0, 255, 255, 0.15); --border-color: rgba(255, 0, 255, 0.3);
            --shadow: 0 0 25px rgba(0, 255, 255, 0.3); --panel-bg: rgba(5, 5, 5, 0.95); --option-bg: #000000;
        }

        .theme-nord {
            --bg-color: #2e3440; --surface-color: #3b4252; --text-color: #eceff4; --accent-color: #88c0d0;
            --secondary-color: #b48ead; --grid-color: rgba(216, 222, 233, 0.05); --border-color: #4c566a;
            --shadow: 0 10px 30px rgba(0,0,0,0.5); --panel-bg: rgba(46, 52, 64, 0.9); --option-bg: #3b4252;
            --highlight-yellow: rgba(235, 203, 139, 0.3); --highlight-green: rgba(163, 190, 140, 0.3);
        }

        .theme-monokai {
            --bg-color: #272822; --surface-color: #3e3d32; --text-color: #f8f8f2; --accent-color: #a6e22e;
            --secondary-color: #fd971f; --grid-color: rgba(248, 248, 242, 0.05); --border-color: #75715e;
            --shadow: 0 10px 30px rgba(0,0,0,0.6); --panel-bg: rgba(39, 40, 34, 0.9); --option-bg: #3e3d32;
            --highlight-yellow: rgba(230, 219, 116, 0.3); --highlight-green: rgba(166, 226, 46, 0.3);
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden; user-select: none; touch-action: none;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .app-panel {
            background: var(--panel-bg); backdrop-filter: var(--backdrop);
            border: 1px solid var(--border-color); box-shadow: var(--shadow);
        }

        /* Barra flotante estilo app moderna */
        .floating-island {
            position: absolute; top: 1rem; left: 50%; transform: translateX(-50%);
            width: 96%; max-width: 1400px; z-index: 50;
            border-radius: 1.5rem; padding: 0.75rem 1.5rem;
        }

        .math-step { transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; pointer-events: none; }
        .math-step.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        .math-step.hidden-next { transform: translateY(40px) scale(0.95); }
        .math-step.hidden-prev { transform: translateY(-40px) scale(0.95); opacity: 0.3; }

        .workspace {
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px; width: 100vw; height: 100vh; position: relative; overflow: hidden;
        }

        .zoom-wrapper { position: absolute; transform-origin: 0 0; transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1); will-change: transform; }
        .zoom-wrapper.dragging { transition: none; }
        .artboard { background-color: var(--surface-color); box-shadow: var(--shadow); border: 1px solid var(--border-color); position: relative; overflow: hidden; transition: background-color 0.4s ease; }
        .theme-neon .artboard { box-shadow: 0 0 40px rgba(0, 255, 255, 0.1), inset 0 0 60px rgba(255, 0, 255, 0.05); border: 1px solid rgba(255, 0, 255, 0.3); }

        .editable-item { position: absolute; cursor: grab; user-select: text; transform-origin: top left; min-width: max-content; white-space: nowrap; }
        .editable-item:active { cursor: grabbing; }
        .editable-item.selected { outline: 2px dashed var(--accent-color); outline-offset: 4px; }
        .theme-neon .editable-item.selected { outline-color: var(--secondary-color); box-shadow: 0 0 15px var(--secondary-color); }
        
        .z-badge { position: absolute; top: -24px; right: -24px; background: var(--secondary-color); color: #fff; font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 12px; opacity: 0; pointer-events: none; }
        .editable-item.selected .z-badge { opacity: 1; }

        .resize-handle { position: absolute; bottom: -6px; right: -6px; width: 14px; height: 14px; background: var(--surface-color); border: 2px solid var(--accent-color); border-radius: 50%; cursor: nwse-resize; pointer-events: auto; z-index: 100; }

        .btn-tool { transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-tool:hover { background-color: var(--accent-color); color: #fff; }
        .btn-tool.active { background-color: var(--accent-color); color: #fff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); }
        .btn-action { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-action:hover { transform: scale(1.05); }
        .btn-action:active { transform: scale(0.95); }

        .katex-display { margin: 0 !important; }
        .math-scalable { transition: transform 0.1s; transform-origin: top left; }

        /* Ajuste nativo selects (Evita el fondo blanco en móviles/Safari) */
        .app-select {
            appearance: none; -webkit-appearance: none; -moz-appearance: none;
            background-color: var(--surface-color); color: var(--text-color);
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23999" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat; background-position: right 0.5rem center; padding-right: 2.2rem;
        }
        .app-select option { background-color: var(--option-bg); color: var(--option-color); font-weight: 600; }

        .vector-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .vector-path { pointer-events: stroke; cursor: pointer; transition: stroke-width 0.2s; }
        .vector-path:hover { stroke-width: 6; }
        .vector-handle { fill: var(--surface-color); stroke: var(--accent-color); stroke-width: 3; cursor: grab; pointer-events: auto; }
        
        @keyframes flowLightDynamic { from { stroke-dashoffset: 100; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } to { stroke-dashoffset: 0; opacity: 0; } }
        .arrow-light { stroke-dasharray: 10 100; animation: flowLightDynamic 1.5s linear infinite; pointer-events: none; filter: drop-shadow(0 0 10px var(--accent-color)); stroke-linecap: round; }
        .theme-neon .arrow-light { filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px var(--accent-color)); stroke-width: 4; }

        .draw-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 60; }
        .draw-layer.active { pointer-events: auto; touch-action: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .rec-dot { width: 10px; height: 10px; background-color: #ef4444; border-radius: 50%; animation: pulse-red 2s infinite; }
    </style>
</head>

            { id: 'm10', type: 'math', content: '|A| = 6 + 4 - 1', x: 100, y: 3960, z: 10, step: 9, scale: 1.4, color: 'var(--text-color)' },
            { id: 'm11', type: 'math', content: '|A| = 9', x: 100, y: 4080, z: 10, step: 10, scale: 2.2, color: 'var(--accent-color)', bold: true },
        ];

        const initialArrows = [
            { id: 'a1', start: {x: 525, y: 1740}, end: {x: 230, y: 1960}, cp1: {x: 525, y: 1850}, cp2: {x: 230, y: 1850}, color: 'var(--accent-color)', step: 3 },
            { id: 'a2', start: {x: 595, y: 2340}, end: {x: 230, y: 2560}, cp1: {x: 595, y: 2450}, cp2: {x: 230, y: 2450}, color: 'var(--accent-color)', step: 4 },
            { id: 'a3', start: {x: 665, y: 2940}, end: {x: 230, y: 3160}, cp1: {x: 665, y: 3050}, cp2: {x: 230, y: 3050}, color: 'var(--accent-color)', step: 5 },
        ];

        const initialTeleprompter = [
            { step: 0, tag: "GANCHO", action: "Mirar a cámara, enérgico", text: "¡Hoy aprenderemos a calcular un determinante 3x3 paso a paso y sin enredarnos!" },
            { step: 1, tag: "EXPLICACIÓN", action: "Señalar matriz", text: "El primer paso es expresar la matriz en formato determinante con barras verticales." },
            { step: 2, tag: "ENFOQUE", action: "Pausa dramática", text: "Ahora, viene el truco principal: hallaremos el 'menor' y el 'cofactor' para la primera fila." },
            { step: 3, tag: "ACCIÓN", action: "Tono didáctico", text: "Tomamos el primer número (3). Eliminamos su fila y su columna. El determinante 2x2 que nos sobra es su 'menor'." },
            { step: 4, tag: "ALERTA", action: "Levantar cejas (Ojo)", text: "Hacemos lo mismo con el segundo (-1). ¡Pero ojo aquí! Fíjate cómo el signo exterior alterna a negativo." },
            { step: 5, tag: "CONTINUACIÓN", action: "Ritmo rápido", text: "Y finalmente con el tercer elemento (1). Con esto, ya tenemos la ecuación principal armada." },
            { step: 6, tag: "DESARROLLO", action: "Tono explicativo", text: "Ahora resolvemos estos pequeños determinantes 2x2 multiplicando en cruz." },
            { step: 7, tag: "CÁLCULO", action: "Velocidad normal", text: "Simplificamos las multiplicaciones internas que están dentro de los corchetes." },
            { step: 8, tag: "CÁLCULO", action: "Velocidad normal", text: "Hacemos las restas correspondientes..." },
            { step: 9, tag: "CÁLCULO", action: "Velocidad normal", text: "Multiplicamos por los cofactores que dejamos afuera." },
            { step: 10, tag: "CIERRE", action: "Sonrisa, logro", text: "Sumamos todo y ¡listo! El resultado es 9. ¡Así de fácil se calcula un determinante 3x3!" },
        ];

        const MathNode = ({ content, color }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    try { katex.render(content, containerRef.current, { displayMode: true, throwOnError: false }); } 
                    catch (e) { containerRef.current.innerText = "Error LaTeX"; }
                }
            }, [content]);
            return <div ref={containerRef} style={{ color, pointerEvents: 'none', display: 'inline-block' }} />;
        };

        const MathStudio = () => {
            const [elements, setElements] = useState(initialElements);
            const [arrows, setArrows] = useState(initialArrows);
            const [strokes, setStrokes] = useState([]);
            
            const [mode, setMode] = useState('present'); 
            const [theme, setTheme] = useState('neon'); 
            const [format, setFormat] = useState('9:16'); 
            const [zoom, setZoom] = useState(1);
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [isDraggingPan, setIsDraggingPan] = useState(false);
            
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const totalSteps = 10;

            const [activeTool, setActiveTool] = useState('select'); 
            const [selectedIds, setSelectedIds] = useState([]);
            const [selectedArrowId, setSelectedArrowId] = useState(null);
            const [editingElement, setEditingElement] = useState(null);
            const [history, setHistory] = useState([]);
            
            const [currentUser, setCurrentUser] = useState(null);

            const workspaceRef = useRef(null);
            const boardRef = useRef(null);
            const canvasRef = useRef(null);

            const boardWidth = format === '16:9' ? 1920 : 1080;
            const boardHeight = format === '16:9' ? 1080 : 4200;

            // Inicialización de Firebase Auth
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const app = window.FirebaseAPI.initializeApp(firebaseConfig);
                        const auth = window.FirebaseAPI.getAuth(app);
                        const unsubscribe = window.FirebaseAPI.onAuthStateChanged(auth, (user) => {
                            setCurrentUser(user);
                        });
                        return () => unsubscribe();
                    } catch (e) { console.error("Firebase init error:", e); }
                };
                initAuth();
            }, []);

            // Login con Google
            const handleLogin = async () => {
                try {
                    const app = window.FirebaseAPI.initializeApp(firebaseConfig);
                    const auth = window.FirebaseAPI.getAuth(app);
                    const provider = new window.FirebaseAPI.GoogleAuthProvider();
                    await window.FirebaseAPI.signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Error al iniciar sesión:", error);
                    alert("No se pudo iniciar sesión con Google.");
                }
            };

            const handleLogout = async () => {
                try {
                    const app = window.FirebaseAPI.initializeApp(firebaseConfig);
                    const auth = window.FirebaseAPI.getAuth(app);
                    await window.FirebaseAPI.signOut(auth);
                } catch (error) { console.error(error); }
            };

            // Zoom responsivo
            useEffect(() => {
                const handleResize = () => {
                    const screenWidth = window.innerWidth;
                    const autoZoom = Math.min(1, screenWidth / boardWidth);
                    setZoom(autoZoom);
                    setPan({ x: 0, y: 0 });
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, [format, boardWidth]);

            // Auto-Pan (Centrado Dinámico)
            useEffect(() => {
                if (mode !== 'edit' && currentStep >= 0) {
                    const stepEls = elements.filter(e => e.step === currentStep);
                    let targetPanY = 0;
                    
                    if (stepEls.length > 0) {
                        // 1. Encontrar los extremos verticales (Y) de los elementos de este paso
                        const minY = Math.min(...stepEls.map(e => e.y));
                        const maxY = Math.max(...stepEls.map(e => e.y));
                        
                        // 2. Calcular el centro matemático de esos elementos
                        const centerY = (minY + maxY) / 2;
                        
                        // 3. Definir el centro visual de la pantalla (usamos el 45% de la altura 
                        // para que quede centrado pero con "aire" inferior para el teleprompter)
                        const screenCenterY = window.innerHeight * 0.45;
                        
                        // 4. Ajuste de desplazamiento interno de la app (offset)
                        const offset = mode === 'record' ? 0 : 100;
                        
                        // 5. Ecuación final de centrado
                        targetPanY = screenCenterY - (centerY * zoom) - offset;
                    }
                    
                    // Si es el Paso 0 (Generalmente el Título), lo dejamos anclado arriba para contexto
                    if (currentStep === 0) {
                        targetPanY = 0; 
                    }
                    
                    setPan(prev => ({ ...prev, y: targetPanY }));
                }
            }, [currentStep, elements, mode, zoom]);

            // Reproductor
            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        setCurrentStep(p => {
                            if (p < totalSteps) return p + 1;
                            setIsPlaying(false); return p;
                        });
                    }, 4000); 
                }
                return () => clearInterval(interval);
            }, [isPlaying]);

            const saveStateToHistory = useCallback(() => {
                setHistory(prev => [...prev, { elements, arrows, strokes }].slice(-40));
            }, [elements, arrows, strokes]);

            const undo = () => {
                if (history.length > 0) {
                    const last = history[history.length - 1];
                    setElements(last.elements); setArrows(last.arrows); setStrokes(last.strokes);
                    setHistory(prev => prev.slice(0, -1));
                }
            };

            const handleWorkspacePointerDown = (e) => {
                if (mode !== 'edit') return;
                if (e.target.closest('.editable-item') || e.target.closest('.vector-handle') || e.target.closest('.vector-path') || e.target.closest('.resize-handle')) return;
                
                setIsDraggingPan(true);
                const startX = e.clientX - pan.x;
                const startY = e.clientY - pan.y;

                const onMove = (ev) => setPan({ x: ev.clientX - startX, y: ev.clientY - startY });
                const onUp = () => {
                    setIsDraggingPan(false);
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                };
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
            };

            const handleElementPointerDown = (e, id) => {
                if (mode !== 'edit' || activeTool !== 'select') return;
                e.stopPropagation();
                setSelectedArrowId(null);

                const isMulti = e.shiftKey;
                const newSelected = isMulti ? (selectedIds.includes(id) ? selectedIds.filter(i=>i!==id) : [...selectedIds, id]) : [id];
                setSelectedIds(newSelected);

                const startX = e.clientX;
                const startY = e.clientY;
                const startElements = JSON.parse(JSON.stringify(elements));

                const onMove = (ev) => {
                    const dx = (ev.clientX - startX) / zoom;
                    const dy = (ev.clientY - startY) / zoom;
                    setElements(startElements.map(el => newSelected.includes(el.id) ? { ...el, x: el.x + dx, y: el.y + dy } : el));
                };
                const onUp = () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                    saveStateToHistory();
                };
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
            };

            const handleShapeResize = (e, id) => {
                e.stopPropagation();
                const startX = e.clientX;
                const startY = e.clientY;
                const elIndex = elements.findIndex(e => e.id === id);
                const startW = elements[elIndex].w;
                const startH = elements[elIndex].h;

                const onMove = (ev) => {
                    const dx = (ev.clientX - startX) / zoom;
                    const dy = (ev.clientY - startY) / zoom;
                    setElements(prev => {
                        const newEls = [...prev];
                        newEls[elIndex].w = Math.max(10, startW + dx);
                        newEls[elIndex].h = Math.max(10, startH + dy);
                        return newEls;
                    });
                };
                const onUp = () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                    saveStateToHistory();
                };
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
            };

            const handleArrowDrag = (e, id, nodeType) => {
                e.stopPropagation();
                const startX = e.clientX;
                const startY = e.clientY;
                const initialArrState = JSON.parse(JSON.stringify(arrows));
                const idx = initialArrState.findIndex(a => a.id === id);

                const onMove = (ev) => {
                    const dx = (ev.clientX - startX) / zoom;
                    const dy = (ev.clientY - startY) / zoom;
                    setArrows(prev => {
                        const newArrows = [...prev];
                        newArrows[idx][nodeType] = { x: initialArrState[idx][nodeType].x + dx, y: initialArrState[idx][nodeType].y + dy };
                        return newArrows;
                    });
                };
                const onUp = () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                    saveStateToHistory();
                };
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                strokes.forEach(stroke => {
                    if (stroke.points.length < 2) return;
                    ctx.beginPath();
                    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                    for (let i = 1; i < stroke.points.length; i++) {
                        const p = stroke.points[i];
                        ctx.lineTo(p.x, p.y);
                        ctx.lineWidth = stroke.width * (p.pressure || 1);
                        ctx.strokeStyle = stroke.color;
                        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                        ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y);
                    }
                });
            }, [strokes, zoom]);

            const getAngle = (p1, p2) => Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;

            // --- SISTEMA FIREBASE PARA PRODUCCIÓN (Tus reglas) ---
            const handleCloudSync = async () => {
                try {
                    const app = window.FirebaseAPI.initializeApp(firebaseConfig);
                    const auth = window.FirebaseAPI.getAuth(app);
                    const db = window.FirebaseAPI.getFirestore(app);
                    
                    if (!auth.currentUser) await window.FirebaseAPI.signInAnonymously(auth);
                    if (!auth.currentUser) return;
                    
                    await window.FirebaseAPI.setDoc(window.FirebaseAPI.doc(db, 'artifacts', MAIN_APP_ID, 'users', auth.currentUser.uid, 'projects', 'main'), { 
                        elements, arrows, strokes, theme, format, timestamp: Date.now() 
                    });
                    alert("✅ Guardado exitoso en Firebase");
                } catch (e) { 
                    console.error(e); 
                    alert("❌ Error al guardar. Verifica permisos o login.");
                }
            };

            const handleCloudLoad = async () => {
                try {
                    const app = window.FirebaseAPI.initializeApp(firebaseConfig);
                    const auth = window.FirebaseAPI.getAuth(app);
                    const db = window.FirebaseAPI.getFirestore(app);
                    
                    if (!auth.currentUser) await window.FirebaseAPI.signInAnonymously(auth);
                    if (!auth.currentUser) return;
                    
                    const docRef = window.FirebaseAPI.doc(db, 'artifacts', MAIN_APP_ID, 'users', auth.currentUser.uid, 'projects', 'main');
                    const docSnap = await window.FirebaseAPI.getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.elements) setElements(data.elements);
                        if (data.arrows) setArrows(data.arrows);
                        if (data.strokes) setStrokes(data.strokes);
                        if (data.theme) setTheme(data.theme);
                        if (data.format) setFormat(data.format);
                        
                        saveStateToHistory(); 
                        alert("☁️ Proyecto cargado.");
                    } else {
                        alert("ℹ️ No hay proyectos guardados en tu cuenta.");
                    }
                } catch (e) { 
                    console.error(e);
                    alert("❌ Error al cargar.");
                }
            };

            return (
                <div className={`theme-${theme} w-full h-[100dvh] flex flex-col font-sans relative overflow-hidden`}>
                    
                    {/* BOTÓN SALIR GRABACIÓN */}
                    {mode === 'record' && (
                        <button className="absolute top-4 right-4 z-50 app-panel p-3 rounded-full hover:bg-red-600 hover:text-white transition shadow-[0_0_15px_rgba(239,68,68,0.5)] text-[var(--text-color)] font-bold flex items-center gap-2 border border-red-500/50"
                                onClick={() => setMode('present')} title="Salir">
                            <Icons.X /> Salir
                        </button>
                    )}

                    {/* SUPER NAVBAR FLOTANTE (Estilo App Moderna) */}
                    {mode !== 'record' && (
                        <header className="floating-island app-panel flex flex-col lg:flex-row justify-between items-center gap-4 lg:gap-2 border border-[var(--border-color)] shadow-2xl">
                            
                            {/* Bloque Izquierdo: Branding y Modo */}
                            <div className="flex items-center gap-4 w-full lg:w-auto justify-between lg:justify-start">
                                <h1 className="text-xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-[var(--accent-color)] to-[var(--secondary-color)]">
                                    MathStudio
                                </h1>
                                <select className="app-select outline-none cursor-pointer font-bold border border-[var(--border-color)] rounded-lg py-1.5 pl-3 text-sm" 
                                        value={mode} onChange={(e) => { setMode(e.target.value); setSelectedIds([]); setSelectedArrowId(null); setIsPlaying(false); }}>
                                    <option value="present">Presentación</option>
                                    <option value="edit">Edición Visual</option>
                                    <option value="record">Grabar</option>
                                </select>
                            </div>
                            
                            {/* Bloque Central: Herramientas de Edición */}
                            {mode === 'edit' && (
                                <div className="flex bg-[var(--surface-color)] rounded-xl p-1 shadow-inner w-full lg:w-auto justify-center">
                                    <button className={`p-2 rounded-lg btn-tool ${activeTool === 'select' ? 'active' : ''}`} onClick={() => setActiveTool('select')} title="Cursor"><Icons.MousePointer /></button>
                                    <button className={`p-2 rounded-lg btn-tool ${activeTool === 'pen' ? 'active' : ''}`} onClick={() => setActiveTool('pen')} title="Lápiz"><Icons.PenTool /></button>
                                    <button className={`p-2 rounded-lg btn-tool ${activeTool === 'eraser' ? 'active' : ''}`} onClick={() => setActiveTool('eraser')} title="Borrador"><Icons.Eraser /></button>
                                    <div className="w-px bg-[var(--border-color)] mx-2"></div>
                                    <button className="p-2 rounded-lg btn-tool opacity-80 hover:opacity-100" onClick={undo} title="Deshacer"><Icons.Undo /></button>
                                </div>
                            )}

                            {/* Bloque Derecho: Settings, Auth y Nube */}
                            <div className="flex items-center gap-3 w-full lg:w-auto justify-center lg:justify-end overflow-x-auto pb-1 lg:pb-0">
                                
                                {/* Temas */}
                                <select className="app-select text-xs font-semibold border border-[var(--border-color)] rounded-lg py-1.5 pl-2" 
                                        value={theme} onChange={e=>setTheme(e.target.value)}>
                                    <option value="neon">Neón</option>
                                    <option value="nord">Nord</option>
                                    <option value="monokai">Monokai</option>
                                    <option value="glass">Glass</option>
                                    <option value="dark">Oscuro</option>
                                    <option value="light">Claro</option>
                                </select>

                                <select className="app-select text-xs font-semibold border border-[var(--border-color)] rounded-lg py-1.5 pl-2" 
                                        value={format} onChange={e=>setFormat(e.target.value)}>
                                    <option value="9:16">9:16 (Móvil)</option>
                                    <option value="16:9">16:9 (PC)</option>
                                </select>

                                <div className="w-px h-6 bg-[var(--border-color)] hidden lg:block"></div>

                                {/* Botones Nube */}
                                <div className="flex bg-[var(--surface-color)] rounded-xl p-1 shadow-inner">
                                    <button className="p-1.5 rounded-lg btn-tool text-[var(--accent-color)]" onClick={handleCloudSync} title="Guardar a la Nube"><Icons.CloudSave /></button>
                                    <button className="p-1.5 rounded-lg btn-tool text-[var(--secondary-color)]" onClick={handleCloudLoad} title="Cargar de la Nube"><Icons.CloudLoad /></button>
                                </div>

                                {/* Auth Administrador */}
                                {currentUser && !currentUser.isAnonymous ? (
                                    <button className="flex items-center gap-2 p-1.5 px-3 rounded-lg text-xs font-bold bg-red-500/10 text-red-500 border border-red-500/30 hover:bg-red-500 hover:text-white transition" 
                                            onClick={handleLogout} title={currentUser.email}>
                                        <Icons.Logout />
                                    </button>
                                ) : (
                                    <button className="flex items-center gap-2 p-1.5 px-3 rounded-lg text-xs font-bold bg-[var(--accent-color)] text-white hover:opacity-90 transition shadow-lg" 
                                            onClick={handleLogin}>
                                        <Icons.Login /> Login
                                    </button>
                                )}
                            </div>
                        </header>
                    )}

                    {/* CONTROLES FLOTANTES ZOOM */}
                    <div className="absolute right-4 top-1/2 transform -translate-y-1/2 z-40 flex flex-col gap-2">
                        <button className="app-panel p-3 rounded-full hover:bg-[var(--accent-color)] hover:text-white transition shadow-lg" onClick={() => setZoom(z => z + 0.1)}><Icons.ZoomIn /></button>
                        <button className="app-panel p-3 rounded-full font-bold text-xs shadow-lg" onClick={() => {setZoom(Math.min(1, window.innerWidth / boardWidth)); setPan({x:0,y:0});}}>{Math.round(zoom * 100)}%</button>
                        <button className="app-panel p-3 rounded-full hover:bg-[var(--accent-color)] hover:text-white transition shadow-lg" onClick={() => setZoom(z => Math.max(0.1, z - 0.1))}><Icons.ZoomOut /></button>
                    </div>

                    {/* LIENZO */}
                    <main className="workspace" ref={workspaceRef} onPointerDown={handleWorkspacePointerDown} onWheel={(e) => { if(mode==='edit') setPan(p => ({ x: p.x - e.deltaX, y: p.y - e.deltaY })); }}>
                        <div className={`zoom-wrapper shadow-2xl ${isDraggingPan ? 'dragging' : ''}`}
                             style={{ width: boardWidth, height: boardHeight, transform: `translate(${mode==='edit'? pan.x : (window.innerWidth - boardWidth*zoom)/2}px, ${mode==='edit'? pan.y : pan.y + (mode==='record'? 0:100)}px) scale(${zoom})` }}>
                            
                            <div className="artboard w-full h-full" ref={boardRef} onClick={(e)=>{if(e.target===boardRef.current){setSelectedIds([]);setSelectedArrowId(null);}}}>
                                
                                {/* CAPA VECTORIAL (Luz Continua con pathLength) */}
                                <svg className="vector-layer">
                                    {arrows.map(arr => {
                                        const isVisible = mode === 'edit' || arr.step <= currentStep;
                                        if (!isVisible) return null;
                                        const pathD = `M ${arr.start.x} ${arr.start.y} C ${arr.cp1.x} ${arr.cp1.y}, ${arr.cp2.x} ${arr.cp2.y}, ${arr.end.x} ${arr.end.y}`;
                                        const isSelected = selectedArrowId === arr.id;

                                        return (
                                            <g key={arr.id} className="math-step visible">
                                                <path d={pathD} fill="none" stroke="transparent" strokeWidth="30" pointerEvents="stroke" onClick={(e) => { if(mode==='edit'){ setSelectedArrowId(arr.id); setSelectedIds([]); e.stopPropagation();} }} />
                                                <path d={pathD} fill="none" stroke={arr.color} strokeWidth="5" pointerEvents="none" opacity={isSelected ? 0.3 : 1} />
                                                
                                                {/* Motor de Luz direccional */}
                                                {(mode === 'present' || mode === 'record' || isPlaying) && (
                                                    <path d={pathD} fill="none" stroke="#fff" strokeWidth="3" pathLength="100" className="arrow-light" />
                                                )}
                                                
                                                <polygon points="-10,-8 10,0 -10,8" fill={arr.color} transform={`translate(${arr.end.x}, ${arr.end.y}) rotate(${getAngle(arr.cp2, arr.end)})`} />

                                                {mode === 'edit' && isSelected && (
                                                    <g>
                                                        <line x1={arr.start.x} y1={arr.start.y} x2={arr.cp1.x} y2={arr.cp1.y} stroke="var(--text-color)" strokeDasharray="4" opacity="0.5"/>
                                                        <line x1={arr.end.x} y1={arr.end.y} x2={arr.cp2.x} y2={arr.cp2.y} stroke="var(--text-color)" strokeDasharray="4" opacity="0.5"/>
                                                        <circle cx={arr.start.x} cy={arr.start.y} r="10" className="vector-handle" onPointerDown={(e) => handleArrowDrag(e, arr.id, 'start')} />
                                                        <circle cx={arr.cp1.x} cy={arr.cp1.y} r="10" className="vector-handle" fill="#facc15" onPointerDown={(e) => handleArrowDrag(e, arr.id, 'cp1')} />
                                                        <circle cx={arr.cp2.x} cy={arr.cp2.y} r="10" className="vector-handle" fill="#facc15" onPointerDown={(e) => handleArrowDrag(e, arr.id, 'cp2')} />
                                                        <circle cx={arr.end.x} cy={arr.end.y} r="10" className="vector-handle" onPointerDown={(e) => handleArrowDrag(e, arr.id, 'end')} />
                                                    </g>
                                                )}
                                            </g>
                                        );
                                    })}
                                </svg>

                                {/* CAPA DE ELEMENTOS */}
                                {elements.map(el => {
                                    const isVisible = mode === 'edit' || el.step <= currentStep;
                                    const isSelected = selectedIds.includes(el.id);
                                    let seqClass = mode === 'edit' ? 'math-step visible' : (el.step > currentStep ? 'math-step hidden-next' : 'math-step visible');

                                    return (
                                        <div key={el.id} id={el.id} className={`editable-item ${seqClass} ${isSelected ? 'selected' : ''}`}
                                             style={{ left: el.x, top: el.y, zIndex: el.z, fontFamily: el.type === 'text' ? 'system-ui, sans-serif' : 'inherit', fontWeight: el.bold ? 'bold' : 'normal', fontSize: '28px', transform: `scale(${el.scale || 1})` }}
                                             onPointerDown={(e) => handleElementPointerDown(e, el.id)} onDoubleClick={(e) => { if(mode==='edit') setEditingElement(el); e.stopPropagation(); }}
                                             onWheel={(e) => { if (mode === 'edit' && isSelected) { e.preventDefault(); setElements(p => p.map(i => i.id===el.id ? {...i, scale: Math.max(0.2, (i.scale||1) + (e.deltaY<0?0.05:-0.05))} : i)); } }}>
                                            
                                            {mode === 'edit' && isSelected && <div className="z-badge">Z: {el.z}</div>}
                                            {el.type === 'math' && <MathNode content={el.content} color={el.color} />}
                                            {el.type === 'text' && <div style={{ color: el.color, whiteSpace: 'pre-wrap' }}>{el.content}</div>}
                                            {el.type === 'shape' && (
                                                <div style={{ width: el.w, height: el.h, backgroundColor: el.color, borderRadius: el.shapeType==='circle'?'50%':'8px', pointerEvents:'none', border: `2px solid ${el.color.replace(/[\d.]+\)$/g, '0.8)')}` }}>
                                                    {mode === 'edit' && isSelected && <div className="resize-handle" onPointerDown={(e) => handleShapeResize(e, el.id)} />}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}

                                {/* CAPA CANVAS */}
                                <canvas ref={canvasRef} width={boardWidth} height={boardHeight} className="draw-layer" />
                            </div>
                        </div>
                    </main>

                    {/* TELEPROMPTER & MEDIA CONTROLS */}
                    {(mode === 'present' || mode === 'record') && (
                        <div className="absolute bottom-8 md:bottom-12 left-1/2 transform -translate-x-1/2 w-[95%] max-w-3xl z-50">
                            <div className={`app-panel p-4 md:p-6 rounded-2xl flex flex-col gap-4 border-t-4 border-t-[var(--accent-color)] ${mode==='record' ? 'opacity-95 shadow-[0_0_30px_rgba(0,0,0,0.8)]' : ''}`}>
                                
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center text-sm font-bold opacity-90 gap-3">
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <span className="bg-[var(--surface-color)] px-3 py-1.5 rounded-lg border border-[var(--border-color)]">Paso {currentStep} de {totalSteps}</span>
                                        {mode === 'record' && <div className="flex items-center gap-2 text-red-500 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20"><div className="rec-dot"></div> REC</div>}
                                        {initialTeleprompter.find(t => t.step === currentStep)?.tag && (
                                            <span className="bg-purple-500/20 text-purple-400 border border-purple-500/30 px-2 py-1 rounded-lg uppercase tracking-wider text-[10px] sm:text-xs">
                                                🔥 {initialTeleprompter.find(t => t.step === currentStep).tag}
                                            </span>
                                        )}
                                        {initialTeleprompter.find(t => t.step === currentStep)?.action && (
                                            <span className="bg-blue-500/20 text-blue-400 border border-blue-500/30 px-2 py-1 rounded-lg text-[10px] sm:text-xs italic">
                                                🎭 {initialTeleprompter.find(t => t.step === currentStep).action}
                                            </span>
                                        )}
                                    </div>
                                    
                                    <div className="flex bg-[var(--surface-color)] rounded-full p-1 border border-[var(--border-color)] shadow-inner w-full md:w-auto justify-center">
                                        <button className="p-2 md:p-3 rounded-full hover:bg-[var(--accent-color)] hover:text-white transition" onClick={() => setCurrentStep(0)}><Icons.Rewind /></button>
                                        <button className="p-2 md:p-3 rounded-full hover:bg-[var(--surface-color)] transition opacity-70 hover:opacity-100" onClick={() => setCurrentStep(p => Math.max(0, p - 1))}><Icons.SkipBack /></button>
                                        <button className={`p-2 md:p-3 mx-1 rounded-full text-white shadow-lg transition transform hover:scale-110 active:scale-95 ${isPlaying ? 'bg-red-500' : 'bg-[var(--accent-color)]'}`} onClick={() => setIsPlaying(!isPlaying)}>
                                            {isPlaying ? <Icons.Pause /> : <Icons.Play />}
                                        </button>
                                        <button className="p-2 md:p-3 rounded-full hover:bg-[var(--surface-color)] transition opacity-70 hover:opacity-100" onClick={() => setCurrentStep(p => Math.min(totalSteps, p + 1))}><Icons.SkipForward /></button>
                                    </div>
                                </div>
                                <p className={`text-lg md:text-xl font-medium leading-relaxed ${mode==='record' ? 'text-[var(--accent-color)] drop-shadow-md brightness-150' : ''}`}>{initialTeleprompter.find(t => t.step === currentStep)?.text || "..."}</p>
                            </div>
                        </div>
                    )}

                    {/* MODAL EDITOR */}
                    {editingElement && (
                        <div className="modal-overlay" onClick={(e) => { if(e.target === e.currentTarget) setEditingElement(null); }}>
                            <div className="app-panel p-6 rounded-2xl w-[90%] max-w-xl border-2 border-[var(--accent-color)]">
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-[var(--text-color)]"><Icons.Edit /> Editor Avanzado</h2>
                                <textarea className="w-full h-40 p-4 rounded-xl bg-black/30 font-mono text-sm focus:outline-none focus:ring-2 ring-[var(--accent-color)] text-white placeholder-gray-400 border border-white/10"
                                          value={editingElement.content || ''} onChange={(e) => setEditingElement({...editingElement, content: e.target.value})} />
                                <div className="flex justify-end gap-3 mt-5">
                                    <button className="px-5 py-2.5 rounded-lg hover:bg-white/10 transition font-bold text-[var(--text-color)]" onClick={() => setEditingElement(null)}>Cancelar</button>
                                    <button className="px-6 py-2.5 rounded-lg bg-gradient-to-r from-[var(--accent-color)] to-[var(--secondary-color)] text-white font-bold shadow-[0_0_15px_var(--accent-color)] btn-action"
                                            onClick={() => { setElements(prev => prev.map(el => el.id === editingElement.id ? editingElement : el)); saveStateToHistory(); setEditingElement(null); }}>Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MathStudio />);
    </script>
</body>
</html>
