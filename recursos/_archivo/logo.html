<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>physics10.easy - Paradigma Cuántico y Unificación</title>
    
    <!-- Fuentes de alto nivel para interfaz y matemáticas -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Montserrat', sans-serif;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Añadimos un sutil viñeteado CSS para mayor profundidad */
            background: radial-gradient(circle at center, transparent 40%, rgba(0, 5, 15, 0.4) 100%);
        }

        .logo-text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
            pointer-events: none;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tipografía Premium y Minimalista */
        .logo-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 8vw, 6.5rem);
            color: #ffffff;
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: lowercase;
            /* Brillo cinemático sutil (Bloom simulado en CSS) */
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.2),
                0 0 40px rgba(0, 150, 255, 0.4),
                0 0 80px rgba(100, 0, 255, 0.3);
            background: linear-gradient(180deg, #ffffff 0%, #b3e0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.8rem, 1.5vw, 1.2rem);
            color: rgba(200, 220, 255, 0.8);
            letter-spacing: 0.6em;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 300;
            position: relative;
            padding: 0 20px;
        }

        /* Líneas minimalistas laterales */
        .logo-subtitle::before, .logo-subtitle::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: rgba(200, 220, 255, 0.3);
        }
        .logo-subtitle::before { right: 100%; }
        .logo-subtitle::after { left: 100%; }

        /* Partículas CSS de polvo estelar */
        .css-particles {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: drift 60s linear infinite;
            opacity: 0.3;
        }

        @keyframes drift {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-500px) rotate(5deg); }
        }
    </style>
</head>
<body>

    <div class="css-particles"></div>
    <div id="webgl-container"></div>

    <div class="logo-text-container">
        <h1 class="logo-title">physics10.easy</h1>
        <div class="logo-subtitle">Unified Field Theory</div>
    </div>

    <!-- Importación modular de Three.js para soporte avanzado -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. CONFIGURACIÓN DEL MOTOR DE RENDERIZADO ALTO NIVEL
        // ==========================================
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 18;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        // ToneMapping cinemático para luces realistas
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const logoGroup = new THREE.Group();
        scene.add(logoGroup);

        // ==========================================
        // 2. TEXTURAS MATEMÁTICAS (Simulación LATEX PERFECTA en 8K)
        // ==========================================
        function createPerfectLatexTexture() {
            const canvas = document.createElement('canvas');
            // Resolución masiva para nitidez perfecta (8K width)
            canvas.width = 8192;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(200, 240, 255, 0.85)';
            
            // Usamos tipografía matemática universal
            const mathFont = 'italic 70px "Cambria Math", "Latin Modern Math", "Times New Roman", serif';
            const textFont = '40px "Montserrat", sans-serif';
            
            // Función para dibujar ecuaciones complejas emulando LaTeX
            function drawEquation(x, y, eqType) {
                ctx.font = mathFont;
                if (eqType === 'einstein') {
                    // R_{μν} - 1/2 R g_{μν} + Λ g_{μν} = (8πG / c^4) T_{μν}
                    ctx.fillText('R', x, y);
                    ctx.font = 'italic 40px "Cambria Math"'; ctx.fillText('μν', x + 45, y + 25);
                    ctx.font = mathFont; ctx.fillText('−', x + 110, y);
                    
                    // Fracción 1/2
                    ctx.font = 'italic 45px "Cambria Math"'; ctx.fillText('1', x + 170, y - 25);
                    ctx.fillRect(x + 165, y - 5, 30, 4); // Línea fracción
                    ctx.fillText('2', x + 170, y + 35);
                    
                    ctx.font = mathFont; ctx.fillText('R g', x + 210, y);
                    ctx.font = 'italic 40px "Cambria Math"'; ctx.fillText('μν', x + 310, y + 25);
                    
                    ctx.font = mathFont; ctx.fillText('+ Λ g', x + 380, y);
                    ctx.font = 'italic 40px "Cambria Math"'; ctx.fillText('μν', x + 530, y + 25);
                    
                    ctx.font = mathFont; ctx.fillText('=', x + 600, y);
                    
                    // Fracción 8πG / c^4
                    ctx.font = 'italic 50px "Cambria Math"'; ctx.fillText('8πG', x + 665, y - 25);
                    ctx.fillRect(x + 655, y - 5, 100, 4); // Línea fracción
                    ctx.fillText('c', x + 685, y + 35);
                    ctx.font = 'italic 30px "Cambria Math"'; ctx.fillText('4', x + 710, y + 15);
                    
                    ctx.font = mathFont; ctx.fillText('T', x + 770, y);
                    ctx.font = 'italic 40px "Cambria Math"'; ctx.fillText('μν', x + 815, y + 25);
                } 
                else if (eqType === 'schrodinger') {
                    // iℏ(∂Ψ/∂t) = ĤΨ
                    ctx.fillText('i ℏ', x, y);
                    ctx.font = 'italic 45px "Cambria Math"'; ctx.fillText('∂Ψ', x + 80, y - 25);
                    ctx.fillRect(x + 75, y - 5, 65, 4);
                    ctx.fillText('∂ t', x + 85, y + 35);
                    ctx.font = mathFont; ctx.fillText('=  H Ψ', x + 170, y);
                    ctx.font = '35px "Cambria Math"'; ctx.fillText('^', x + 235, y - 45); // Sombrero operador
                }
                else if (eqType === 'hawking') {
                    // S = (k A c^3) / (4 G ℏ)
                    ctx.fillText('S =', x, y);
                    ctx.font = 'italic 45px "Cambria Math"'; ctx.fillText('k A c', x + 120, y - 25);
                    ctx.font = 'italic 25px "Cambria Math"'; ctx.fillText('3', x + 215, y - 45);
                    ctx.fillRect(x + 110, y - 5, 130, 4);
                    ctx.font = 'italic 45px "Cambria Math"'; ctx.fillText('4 G ℏ', x + 125, y + 35);
                }
            }

            // Distribuimos a lo largo del cilindro holográfico
            drawEquation(200, 256, 'einstein');
            drawEquation(2500, 256, 'schrodinger');
            drawEquation(4800, 256, 'hawking');
            drawEquation(6500, 256, 'einstein'); // Repetimos para cerrar ciclo

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy(); // Máxima nitidez
            return texture;
        }

        // ==========================================
        // 3. GEOMETRÍAS: EL CAMBIO DE PARADIGMA
        // ==========================================
        
        // A. LA SINGULARIDAD / ESPUMA CUÁNTICA (Shader Personalizado)
        // Esto crea una geometría que no existe de forma estática, fluye en el tiempo.
        const coreGeo = new THREE.IcosahedronGeometry(1.8, 64); // Muy tesselada
        
        const coreVertexShader = `
            uniform float uTime;
            varying vec3 vNormal;
            varying vec3 vPosition;
            
            // Función de ruido 3D (Simplex Noise simplificado)
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            float snoise(vec3 v) {
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy; // 2.0*C.x = 1/3 = C.y
                vec3 x3 = x0 - D.yyy;      // -1.0+3.0*C.x = -0.5 = -D.y
                i = mod289(i);
                vec4 p = permute( permute( permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m; return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                vNormal = normal;
                vPosition = position;
                
                // Desplazamiento basado en ruido para crear la superficie fluida (Gravedad Cuántica)
                float noise = snoise(position * 1.5 + uTime * 0.4);
                vec3 newPosition = position + normal * (noise * 0.4);
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;

        const coreFragmentShader = `
            uniform float uTime;
            varying vec3 vNormal;
            varying vec3 vPosition;
            
            void main() {
                // Efecto Fresnel (brillo en los bordes)
                vec3 viewDirection = normalize(cameraPosition - vPosition);
                float fresnelTerm = dot(viewDirection, normalize(vNormal));
                fresnelTerm = clamp(1.0 - fresnelTerm, 0.0, 1.0);
                fresnelTerm = pow(fresnelTerm, 2.5);
                
                // Iridescencia cósmica
                vec3 color1 = vec3(0.0, 0.5, 1.0); // Azul profundo
                vec3 color2 = vec3(0.8, 0.1, 1.0); // Púrpura energía
                vec3 baseColor = mix(color1, color2, sin(vPosition.y * 3.0 + uTime) * 0.5 + 0.5);
                
                vec3 finalColor = baseColor + (vec3(1.0, 1.0, 1.0) * fresnelTerm * 1.5);
                
                gl_FragColor = vec4(finalColor, 0.85); // Semitransparente
            }
        `;

        const coreUniforms = {
            uTime: { value: 0.0 }
        };

        const coreMaterial = new THREE.ShaderMaterial({
            vertexShader: coreVertexShader,
            fragmentShader: coreFragmentShader,
            uniforms: coreUniforms,
            transparent: true,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });

        const quantumCore = new THREE.Mesh(coreGeo, coreMaterial);
        logoGroup.add(quantumCore);

        // B. DIMENSIONES EXTRA (Nudo Calabi-Yau / Torus Knot Complejo)
        // Representa las dimensiones plegadas de la teoría de cuerdas
        const knotGeo = new THREE.TorusKnotGeometry(3.5, 0.15, 300, 20, 7, 11);
        const knotMat = new THREE.MeshPhysicalMaterial({
            color: 0x00ffff,
            emissive: 0x002255,
            roughness: 0.1,
            metalness: 0.8,
            transmission: 0.9, // Material tipo cristal volumétrico
            thickness: 1.0,
            transparent: true,
            opacity: 0.7
        });
        const extraDimensions = new THREE.Mesh(knotGeo, knotMat);
        logoGroup.add(extraDimensions);

        // C. ANILLO DE ECUACIONES (LaTeX) - El horizonte de sucesos
        const tex = createPerfectLatexTexture();
        const mathGeo = new THREE.CylinderGeometry(6, 6, 2.5, 64, 1, true);
        const mathMat = new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const mathRing = new THREE.Mesh(mathGeo, mathMat);
        mathRing.rotation.x = Math.PI / 8; // Inclinación elegante
        logoGroup.add(mathRing);

        // ==========================================
        // 4. ILUMINACIÓN VOLUMÉTRICA ESTILO ESTUDIO
        // ==========================================
        const ambient = new THREE.AmbientLight(0x0a1530, 2.0);
        scene.add(ambient);

        // Luces RectArea simulando pantallas de laboratorio futuristas
        const light1 = new THREE.PointLight(0x00ffff, 150, 20);
        light1.position.set(5, 5, 5);
        scene.add(light1);

        const light2 = new THREE.PointLight(0xff00ff, 150, 20);
        light2.position.set(-5, -5, -5);
        scene.add(light2);

        // Luz central del núcleo
        const coreLight = new THREE.PointLight(0xffffff, 50, 10);
        scene.add(coreLight);

        // ==========================================
        // 5. INTERACCIÓN Y DINÁMICA
        // ==========================================
        let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
        const halfX = window.innerWidth / 2;
        const halfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - halfX);
            mouseY = (e.clientY - halfY);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Actualizar shader del núcleo (La geometría respira y cambia)
            coreUniforms.uTime.value = time;
            quantumCore.rotation.y += 0.002;
            quantumCore.rotation.z += 0.001;

            // Rotación de las dimensiones plegadas
            extraDimensions.rotation.x = time * 0.1;
            extraDimensions.rotation.y = time * 0.15;
            
            // Fluctuación del cristal (Transmission)
            knotMat.thickness = 1.0 + Math.sin(time * 2) * 0.5;

            // Anillo de Ecuaciones girando como el horizonte de un agujero negro
            mathRing.rotation.y -= 0.003;
            // Desplazamiento sutil de la textura para que fluya
            tex.offset.x -= 0.001;

            // Parallax ultra-suave
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            logoGroup.rotation.y += 0.03 * (targetX - logoGroup.rotation.y);
            logoGroup.rotation.x += 0.03 * (targetY - logoGroup.rotation.x);
            
            // Flotación antigravedad
            logoGroup.position.y = Math.sin(time * 0.8) * 0.4;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
