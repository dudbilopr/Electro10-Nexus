<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Biot-Savart: Hilo Recto</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <!-- MathJax -->
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, svg: { fontCache: 'global' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; padding: 6px; border-radius: 6px; width: 100%; font-size: 0.85rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        input[type="range"] { accent-color: #a855f7; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center px-4 z-20 shrink-0 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-purple-500 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-purple-500/20">B</div>
            <h1 class="text-lg font-bold text-white">Simulador <span class="text-purple-400">Ley de Biot-Savart (Hilo)</span></h1>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Controls Sidebar -->
        <aside class="w-80 glass-panel border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto z-10 p-4 space-y-6">
            
            <div>
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-700 pb-2">Parámetros</h2>
                
                <div class="space-y-4">
                    <!-- Tipo de Hilo -->
                    <div>
                        <label class="text-xs font-medium text-slate-400 block mb-1">Tipo de Conductor</label>
                        <select id="type-select" class="input-dark cursor-pointer">
                            <option value="infinite">Hilo Infinito (Aprox)</option>
                            <option value="finite">Hilo Finito</option>
                        </select>
                    </div>

                    <!-- Corriente -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-blue-400 font-medium">Corriente ($I$)</span>
                            <span id="I-val" class="font-mono text-slate-300">10.0 A</span>
                        </div>
                        <input type="range" id="I-slider" min="-20" max="20" step="0.5" value="10" class="w-full accent-blue-500">
                    </div>

                    <!-- Distancia -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-emerald-400 font-medium">Distancia radial ($r$)</span>
                            <span id="r-val" class="font-mono text-slate-300">0.05 m</span>
                        </div>
                        <input type="range" id="r-slider" min="0.01" max="0.2" step="0.01" value="0.05" class="w-full accent-emerald-500">
                    </div>

                    <!-- Longitud (solo si es finito) -->
                    <div id="len-container" class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50 hidden opacity-50 transition-opacity">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-amber-400 font-medium">Longitud Hilo ($L$)</span>
                            <span id="L-val" class="font-mono text-slate-300">0.2 m</span>
                        </div>
                        <input type="range" id="L-slider" min="0.05" max="0.5" step="0.01" value="0.2" class="w-full accent-amber-500">
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                 <button onclick="resetSim()" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-bold transition-colors border border-slate-700">
                    Reiniciar
                </button>
            </div>
        </aside>

        <!-- Center Area -->
        <div class="flex-1 flex flex-col relative bg-slate-950">
            <!-- 3D Canvas -->
            <div id="canvas-container" class="w-full h-1/2 border-b border-slate-800 relative cursor-move">
                <div class="absolute top-4 left-4 z-10 glass-panel px-3 py-2 rounded-lg pointer-events-none">
                    <div class="text-xs font-bold text-slate-400 mb-1">Visualización 3D (Vectores $\vec{B}$)</div>
                    <div class="text-[10px] text-slate-500">Gira para ver la regla de la mano derecha.</div>
                </div>
            </div>

            <!-- Theory and Math (Bottom) -->
            <div class="w-full h-1/2 p-6 overflow-y-auto bg-slate-900 scrollbar-thin flex gap-6">
                
                <!-- Math Panel -->
                <div class="flex-1 min-w-[300px]">
                    <h3 class="text-xs font-bold text-purple-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        Campo Magnético $\vec{B}$
                    </h3>
                    <div class="glass-panel p-4 rounded-xl border-purple-500/30 border">
                        <div id="math-steps" class="space-y-4 text-sm text-slate-300 font-light">
                            <!-- Injected Math -->
                        </div>
                    </div>
                </div>

                <!-- Graphic Panel -->
                <div class="w-[45%] flex flex-col">
                    <h3 class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                        Magnitud $|\vec{B}|$ vs Distancia $r$
                    </h3>
                    <div class="flex-1 glass-panel rounded-xl p-3 relative">
                        <canvas id="chartCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // State
        const MU_0 = 4 * Math.PI * 1e-7;
        let state = {
            type: 'infinite',
            I: 10.0,
            r: 0.05,
            L: 0.2
        };

        // UI Elements
        const typeSelect = document.getElementById('type-select');
        const iSlider = document.getElementById('I-slider');
        const rSlider = document.getElementById('r-slider');
        const lSlider = document.getElementById('L-slider');
        const iVal = document.getElementById('I-val');
        const rVal = document.getElementById('r-val');
        const lVal = document.getElementById('L-val');
        const lenContainer = document.getElementById('len-container');
        const mathSteps = document.getElementById('math-steps');

        // Three.js Setup
        let scene, camera, renderer, controls;
        let wireMesh, bVectorsGroup, currentArrowsGroup;
        const container = document.getElementById('canvas-container');

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(3, 3, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Wire
            const geometry = new THREE.CylinderGeometry(0.05, 0.05, 10, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0xb87333 }); // Copper
            wireMesh = new THREE.Mesh(geometry, material);
            scene.add(wireMesh);

            // Groups
            bVectorsGroup = new THREE.Group();
            currentArrowsGroup = new THREE.Group();
            scene.add(bVectorsGroup);
            scene.add(currentArrowsGroup);

            // Axes
            scene.add(new THREE.AxesHelper(1));

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            animate3D();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            controls.update();
            renderer.render(scene, camera);
        }

        function update3D() {
            // Update Wire length
            const scaleY = state.type === 'infinite' ? 10 : state.L;
            wireMesh.scale.set(1, scaleY, 1);
            
            // Rebuild B Vectors (Magnetic Field circular rings)
            // Visual scale mapping: distance r mapping to 3D space
            const visualR = state.r * 20; // 0.05m -> 1 unit
            
            // Clear groups
            while(bVectorsGroup.children.length > 0){ bVectorsGroup.remove(bVectorsGroup.children[0]); }
            while(currentArrowsGroup.children.length > 0){ currentArrowsGroup.remove(currentArrowsGroup.children[0]); }
            
            // Draw Current Arrow
            if (state.I !== 0) {
                const dirY = state.I > 0 ? 1 : -1;
                const arrowHelper = new THREE.ArrowHelper(
                    new THREE.Vector3(0, dirY, 0),
                    new THREE.Vector3(0, dirY * (scaleY/2 + 0.2), 0),
                    0.5, 0xef4444, 0.2, 0.1
                );
                currentArrowsGroup.add(arrowHelper);
            }

            // Draw B field vectors in a circle
            if (state.I !== 0) {
                const numVectors = 12;
                const bMag = Math.abs(state.I) * 0.1; // Visual scaling for arrow length
                
                // Draw circle path
                const circleGeo = new THREE.RingGeometry(visualR-0.02, visualR+0.02, 32);
                const circleMat = new THREE.MeshBasicMaterial({color: 0x334155, side: THREE.DoubleSide});
                const circle = new THREE.Mesh(circleGeo, circleMat);
                circle.rotation.x = Math.PI / 2;
                bVectorsGroup.add(circle);

                for(let i=0; i<numVectors; i++) {
                    const angle = (i / numVectors) * Math.PI * 2;
                    const x = Math.cos(angle) * visualR;
                    const z = Math.sin(angle) * visualR;
                    
                    // B direction is tangent (Right Hand Rule)
                    let dirX = -Math.sin(angle);
                    let dirZ = Math.cos(angle);
                    
                    if (state.I < 0) {
                        dirX *= -1;
                        dirZ *= -1;
                    }

                    const dir = new THREE.Vector3(dirX, 0, dirZ).normalize();
                    const origin = new THREE.Vector3(x, 0, z);
                    
                    const arrow = new THREE.ArrowHelper(dir, origin, bMag, 0xa855f7, 0.1, 0.05);
                    bVectorsGroup.add(arrow);
                }
            }
        }

        // Chart Setup
        let bChart;
        function initChart() {
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            bChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Magnitud |B| (T)',
                        data: [],
                        borderColor: '#a855f7',
                        backgroundColor: 'rgba(168, 85, 247, 0.2)',
                        borderWidth: 2,
                        tension: 0.1,
                        fill: true,
                        pointRadius: 0
                    },
                    {
                        label: 'Operación Actual',
                        data: [],
                        borderColor: '#ef4444',
                        backgroundColor: '#ef4444',
                        pointRadius: 6,
                        showLine: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { title: { display: true, text: 'Distancia r (m)', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                        y: { title: { display: true, text: 'Campo B (T)', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', format: { notation: "scientific" } } }
                    }
                }
            });
        }

        function calculateB(r) {
            if (state.type === 'infinite') {
                return (MU_0 * Math.abs(state.I)) / (2 * Math.PI * r);
            } else {
                // Finite wire, evaluation at mid-point (symmetry)
                const L_half = state.L / 2;
                const sinTheta = L_half / Math.sqrt(r*r + L_half*L_half);
                // 2 * sinTheta because it's symmetric
                return (MU_0 * Math.abs(state.I) / (4 * Math.PI * r)) * (2 * sinTheta);
            }
        }

        function updateChart() {
            const distances = Array.from({length: 20}, (_, i) => 0.01 + i*0.01); // 0.01 to 0.2m
            const B_vals = distances.map(r => calculateB(r));
            
            bChart.data.labels = distances.map(d => d.toFixed(2));
            bChart.data.datasets[0].data = B_vals;
            
            const currentB = calculateB(state.r);
            bChart.data.datasets[1].data = [{x: state.r.toFixed(2), y: currentB}];
            
            bChart.update();
        }

        function updateUI() {
            iVal.innerText = `${state.I.toFixed(1)} A`;
            rVal.innerText = `${state.r.toFixed(2)} m`;
            lVal.innerText = `${state.L.toFixed(2)} m`;

            const B = calculateB(state.r);

            let formulaStr = "";
            let substitutionStr = "";
            
            if (state.type === 'infinite') {
                formulaStr = `$$ B = \\frac{\\mu_0 I}{2\\pi r} $$`;
                substitutionStr = `$$ B = \\frac{(4\\pi \\times 10^{-7})(${Math.abs(state.I)})}{2\\pi (${state.r})} $$`;
            } else {
                formulaStr = `$$ B = \\frac{\\mu_0 I}{4\\pi r} (\\sin\\theta_1 + \\sin\\theta_2) $$`;
                substitutionStr = `$$ \\text{En el centro: } B = \\frac{\\mu_0 I}{2\\pi r} \\frac{L/2}{\\sqrt{r^2 + (L/2)^2}} $$`;
            }

            let mathHtml = `
                <div class="text-center">
                    <span class="text-xs text-slate-400">Ley de Biot-Savart</span>
                    ${formulaStr}
                </div>
                <div class="mt-4 border-l-4 border-purple-500 pl-3">
                    <div class="text-xs text-slate-400 mb-1">Cálculo:</div>
                    <div class="overflow-x-auto text-sm">
                        ${substitutionStr}
                    </div>
                </div>
                <div class="bg-purple-500/10 p-3 rounded mt-4 border border-purple-500/20 text-center">
                    <span class="text-xs text-purple-400 uppercase tracking-wider font-bold">Magnitud del Campo Magnético</span><br>
                    <span class="text-xl font-mono text-white">$$ |\\vec{B}| = ${B.toExponential(3)}\\ \\text{T} $$</span>
                </div>
            `;
            
            mathSteps.innerHTML = mathHtml;
            if (window.MathJax) MathJax.typesetPromise([mathSteps]);

            update3D();
            updateChart();
        }

        function handleInput() {
            state.type = typeSelect.value;
            state.I = parseFloat(iSlider.value);
            state.r = parseFloat(rSlider.value);
            state.L = parseFloat(lSlider.value);
            
            if (state.type === 'finite') {
                lenContainer.classList.remove('hidden');
                setTimeout(() => lenContainer.classList.remove('opacity-50'), 10);
            } else {
                lenContainer.classList.add('opacity-50');
                setTimeout(() => lenContainer.classList.add('hidden'), 300);
            }

            updateUI();
        }

        function resetSim() {
            typeSelect.value = 'infinite';
            iSlider.value = 10;
            rSlider.value = 0.05;
            lSlider.value = 0.2;
            handleInput();
        }

        // Listeners
        typeSelect.addEventListener('change', handleInput);
        iSlider.addEventListener('input', handleInput);
        rSlider.addEventListener('input', handleInput);
        lSlider.addEventListener('input', handleInput);

        // Init
        init3D();
        initChart();
        handleInput();

    </script>
</body>
</html>
