<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Diagrama de Fasores</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <!-- MathJax -->
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, svg: { fontCache: 'global' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; padding: 6px; border-radius: 6px; width: 100%; font-size: 0.85rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        input[type="range"] { accent-color: #3b82f6; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center px-4 z-20 shrink-0 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-sky-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-sky-500/20">V</div>
            <h1 class="text-lg font-bold text-white">Simulador <span class="text-sky-400">Diagrama de Fasores (Voltajes)</span></h1>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Controls Sidebar -->
        <aside class="w-80 glass-panel border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto z-10 p-4 space-y-6">
            
            <div>
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-700 pb-2">Amplitudes de Voltaje</h2>
                
                <div class="space-y-4">
                    <!-- VR -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-amber-500/30 border-l-4">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-amber-400 font-medium">Voltaje Resistencia ($V_R$)</span>
                            <span id="vr-val" class="font-mono text-slate-300">40 V</span>
                        </div>
                        <input type="range" id="Vr-slider" min="0" max="100" step="1" value="40" class="w-full accent-amber-500">
                    </div>

                    <!-- VL -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-indigo-500/30 border-l-4">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-indigo-400 font-medium">Voltaje Inductor ($V_L$)</span>
                            <span id="vl-val" class="font-mono text-slate-300">80 V</span>
                        </div>
                        <input type="range" id="Vl-slider" min="0" max="100" step="1" value="80" class="w-full accent-indigo-500">
                    </div>

                    <!-- VC -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-emerald-500/30 border-l-4">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-emerald-400 font-medium">Voltaje Capacitor ($V_C$)</span>
                            <span id="vc-val" class="font-mono text-slate-300">50 V</span>
                        </div>
                        <input type="range" id="Vc-slider" min="0" max="100" step="1" value="50" class="w-full accent-emerald-500">
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                 <button id="anim-btn" class="w-full py-2 bg-sky-600 hover:bg-sky-500 text-white rounded-lg text-xs font-bold transition-colors shadow-lg mb-2">
                    Iniciar Rotación ($\omega t$)
                </button>
            </div>
        </aside>

        <!-- Center Area -->
        <div class="flex-1 flex flex-col relative bg-slate-950">
            
            <div class="w-full h-2/3 border-b border-slate-800 relative flex bg-slate-900">
                <!-- Fasor SVG (Left side) -->
                <div class="w-1/2 h-full border-r border-slate-800 relative flex items-center justify-center p-4">
                    <h3 class="absolute top-4 left-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Diagrama Fasorial (Plano Complejo)</h3>
                    
                    <svg id="phasor-svg" viewBox="-150 -150 300 300" class="w-full h-full max-w-sm">
                        <defs>
                            <marker id="arrow-R" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/></marker>
                            <marker id="arrow-L" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#818cf8"/></marker>
                            <marker id="arrow-C" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/></marker>
                            <marker id="arrow-S" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/></marker>
                        </defs>
                        <!-- Axes -->
                        <line x1="-140" y1="0" x2="140" y2="0" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
                        <line x1="0" y1="-140" x2="0" y2="140" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
                        <!-- Circles to guide magnitudes (50, 100) -->
                        <circle cx="0" cy="0" r="50" fill="none" stroke="#1e293b" stroke-width="1"/>
                        <circle cx="0" cy="0" r="100" fill="none" stroke="#1e293b" stroke-width="1"/>
                        
                        <g id="phasors-group">
                            <!-- VR (Amber) -->
                            <line id="p-vr" x1="0" y1="0" x2="40" y2="0" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow-R)"/>
                            <text id="t-vr" x="45" y="-5" fill="#fbbf24" font-size="12" font-family="sans-serif">Vr</text>
                            
                            <!-- VL (Indigo) -->
                            <line id="p-vl" x1="0" y1="0" x2="0" y2="-80" stroke="#818cf8" stroke-width="3" marker-end="url(#arrow-L)"/>
                            <text id="t-vl" x="5" y="-85" fill="#818cf8" font-size="12" font-family="sans-serif">Vl</text>
                            
                            <!-- VC (Emerald) -->
                            <line id="p-vc" x1="0" y1="0" x2="0" y2="50" stroke="#34d399" stroke-width="3" marker-end="url(#arrow-C)"/>
                            <text id="t-vc" x="5" y="60" fill="#34d399" font-size="12" font-family="sans-serif">Vc</text>

                            <!-- Resultant Source Voltage (Red) -->
                            <line id="p-vs" x1="0" y1="0" x2="40" y2="-30" stroke="#f87171" stroke-width="4" marker-end="url(#arrow-S)"/>
                            <text id="t-vs" x="45" y="-35" fill="#f87171" font-size="14" font-weight="bold" font-family="sans-serif">Vs</text>
                        </g>
                    </svg>
                </div>

                <!-- Waveform Chart (Right side) -->
                <div class="w-1/2 h-full relative flex flex-col p-4">
                    <h3 class="absolute top-4 left-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Ondas en el Tiempo $V(t)$</h3>
                    <div class="flex-1 mt-6">
                        <canvas id="waveChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Theory and Math (Bottom) -->
            <div class="w-full h-1/3 p-6 overflow-y-auto bg-slate-950 scrollbar-thin">
                <h3 class="text-xs font-bold text-sky-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Suma Vectorial de Voltajes
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-panel p-4 rounded-xl border-sky-500/30 border flex flex-col justify-center">
                        <div id="math-steps-1" class="text-sm text-slate-300 font-light">
                            <!-- Injected -->
                        </div>
                    </div>
                    <div class="glass-panel p-4 rounded-xl border-red-500/30 border flex items-center justify-center">
                        <div id="math-steps-2" class="text-center">
                            <!-- Injected -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // State
        let state = {
            Vr: 40,
            Vl: 80,
            Vc: 50,
            wt: 0, // omega * t (angle in radians)
            animating: false
        };

        // UI
        const vrSlider = document.getElementById('Vr-slider');
        const vlSlider = document.getElementById('Vl-slider');
        const vcSlider = document.getElementById('Vc-slider');
        const vrVal = document.getElementById('vr-val');
        const vlVal = document.getElementById('vl-val');
        const vcVal = document.getElementById('vc-val');
        const mSteps1 = document.getElementById('math-steps-1');
        const mSteps2 = document.getElementById('math-steps-2');
        const animBtn = document.getElementById('anim-btn');

        // SVG Elements
        const pGroup = document.getElementById('phasors-group');
        const pVr = document.getElementById('p-vr');
        const pVl = document.getElementById('p-vl');
        const pVc = document.getElementById('p-vc');
        const pVs = document.getElementById('p-vs');
        const tVr = document.getElementById('t-vr');
        const tVl = document.getElementById('t-vl');
        const tVc = document.getElementById('t-vc');
        const tVs = document.getElementById('t-vs');

        // Chart
        let waveChart;
        function initChart() {
            const ctx = document.getElementById('waveChart').getContext('2d');
            waveChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Vs (Fuente)', data: [], borderColor: '#f87171', borderWidth: 3, pointRadius: 0 },
                        { label: 'Vr', data: [], borderColor: '#fbbf24', borderWidth: 2, pointRadius: 0, borderDash: [5,5] },
                        { label: 'Vl', data: [], borderColor: '#818cf8', borderWidth: 2, pointRadius: 0, borderDash: [5,5] },
                        { label: 'Vc', data: [], borderColor: '#34d399', borderWidth: 2, pointRadius: 0, borderDash: [5,5] },
                        { label: 'Momento', data: [], backgroundColor: '#f87171', pointRadius: 6, showLine: false } // Represents current time
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { display: false } }, // Hide legend to save space, colors are obvious
                    scales: {
                        x: { display: false, min: 0, max: 4 * Math.PI }, // 2 full waves
                        y: { title: { display: true, text: 'Voltaje (V)', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' }, suggestedMin: -150, suggestedMax: 150 }
                    }
                }
            });
        }

        function updateChartData() {
            const numPoints = 100;
            const xVals = Array.from({length: numPoints}, (_, i) => i * (4 * Math.PI) / numPoints);
            
            waveChart.data.labels = xVals;
            
            // Vs max and phi
            const Vx = state.Vr;
            const Vy = state.Vl - state.Vc;
            const Vs = Math.sqrt(Vx*Vx + Vy*Vy);
            const phi = Math.atan2(Vy, Vx);

            let vsData = [], vrData = [], vlData = [], vcData = [];
            
            xVals.forEach(wt => {
                vrData.push({x: wt, y: state.Vr * Math.cos(wt)});
                vlData.push({x: wt, y: state.Vl * Math.cos(wt + Math.PI/2)});
                vcData.push({x: wt, y: state.Vc * Math.cos(wt - Math.PI/2)});
                vsData.push({x: wt, y: Vs * Math.cos(wt + phi)});
            });

            waveChart.data.datasets[0].data = vsData;
            waveChart.data.datasets[1].data = vrData;
            waveChart.data.datasets[2].data = vlData;
            waveChart.data.datasets[3].data = vcData;

            // Current Time point
            let visWt = state.wt % (4 * Math.PI); // keep it within graph bounds
            waveChart.data.datasets[4].data = [{x: visWt, y: Vs * Math.cos(visWt + phi)}];

            waveChart.update('none');
        }

        // Animation
        let lastTime = 0;
        function animate(time) {
            if (!state.animating) {
                lastTime = 0;
                return;
            }
            if (lastTime === 0) lastTime = time;
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            // omega = 2 rad/s roughly
            state.wt += dt * 2.0;

            updateVisuals();
            requestAnimationFrame(animate);
        }

        function updateVisuals() {
            // Un-rotated Vectors
            // VR is along X
            // VL is along Y (up = negative SVG Y)
            // VC is along -Y (down = positive SVG Y)
            const Vx = state.Vr;
            const Vy = state.Vl - state.Vc; // Standard physics: Vl leads by 90 (up), Vc lags by 90 (down)

            // Resultant magnitude and angle
            const Vs = Math.sqrt(Vx*Vx + Vy*Vy);
            
            // Apply Rotation (wt)
            const deg = -(state.wt * 180 / Math.PI); // negative because SVG rotates clockwise for positive deg
            pGroup.setAttribute('transform', `rotate(${deg}, 0, 0)`);

            // Update lines based on magnitudes (SVG coordinates: +Y is down, so we flip Y)
            // Vr
            pVr.setAttribute('x2', state.Vr);
            tVr.setAttribute('x', state.Vr + 5);
            // Vl (up -> -y)
            pVl.setAttribute('y2', -state.Vl);
            tVl.setAttribute('y', -state.Vl - 5);
            // Vc (down -> +y)
            pVc.setAttribute('y2', state.Vc);
            tVc.setAttribute('y', state.Vc + 15);
            // Vs
            pVs.setAttribute('x2', Vx);
            pVs.setAttribute('y2', -Vy); // SVG Y is inverted
            tVs.setAttribute('x', Vx + 5);
            tVs.setAttribute('y', -Vy - 5);

            updateChartData();
        }

        animBtn.addEventListener('click', () => {
            state.animating = !state.animating;
            if (state.animating) {
                animBtn.innerText = "Pausar Rotación";
                animBtn.classList.replace('bg-sky-600', 'bg-red-600');
                requestAnimationFrame(animate);
            } else {
                animBtn.innerText = "Reanudar Rotación";
                animBtn.classList.replace('bg-red-600', 'bg-sky-600');
            }
        });

        function updateUI() {
            vrVal.innerText = `${state.Vr} V`;
            vlVal.innerText = `${state.Vl} V`;
            vcVal.innerText = `${state.Vc} V`;

            const Vx = state.Vr;
            const Vy = state.Vl - state.Vc;
            const Vs = Math.sqrt(Vx*Vx + Vy*Vy);
            const phi = Math.atan2(Vy, Vx) * 180 / Math.PI;

            mSteps1.innerHTML = `
                <div>Los voltajes en un circuito RLC en serie no se suman algebraicamente sino vectorialmente (como fasores) debido a los desfases.</div>
                <ul class="list-disc pl-5 mt-2 space-y-1">
                    <li><span class="text-amber-400 font-bold">Resistencia ($V_R$):</span> En fase con la corriente.</li>
                    <li><span class="text-indigo-400 font-bold">Inductor ($V_L$):</span> Adelanta $90^\\circ$ a la corriente.</li>
                    <li><span class="text-emerald-400 font-bold">Capacitor ($V_C$):</span> Retrasa $90^\\circ$ a la corriente.</li>
                </ul>
            `;

            mSteps2.innerHTML = `
                <span class="text-xs text-red-400 uppercase tracking-wider font-bold">Voltaje Total ($V_s$)</span><br>
                <span class="text-xl font-mono text-white">$$ V_s = \\sqrt{V_R^2 + (V_L - V_C)^2} $$</span>
                <div class="mt-2 text-sm text-slate-300">
                    $$ V_s = ${Vs.toFixed(1)}\\ \\text{V} $$<br>
                    $$ \\phi = ${phi.toFixed(1)}^\\circ $$
                </div>
            `;

            // Prevent mathjax spam if animating
            if (window.MathJax && !state.animating) {
                MathJax.typesetPromise([mSteps1, mSteps2]);
            }

            if(!state.animating) updateVisuals();
        }

        function handleInput() {
            state.Vr = parseInt(vrSlider.value);
            state.Vl = parseInt(vlSlider.value);
            state.Vc = parseInt(vcSlider.value);
            updateUI();
        }

        vrSlider.addEventListener('input', handleInput);
        vlSlider.addEventListener('input', handleInput);
        vcSlider.addEventListener('input', handleInput);

        initChart();
        handleInput();
        updateVisuals();

    </script>
</body>
</html>
