<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ampere: Solenoide</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <!-- MathJax -->
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, svg: { fontCache: 'global' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; padding: 6px; border-radius: 6px; width: 100%; font-size: 0.85rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        input[type="range"] { accent-color: #3b82f6; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center px-4 z-20 shrink-0 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/20">B</div>
            <h1 class="text-lg font-bold text-white">Simulador <span class="text-blue-400">Ley de Ampere (Solenoide)</span></h1>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Controls Sidebar -->
        <aside class="w-80 glass-panel border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto z-10 p-4 space-y-6">
            
            <div>
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-700 pb-2">Parámetros</h2>
                
                <div class="space-y-4">
                    <!-- Vueltas N -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-amber-400 font-medium">Vueltas Totales ($N$)</span>
                            <span id="N-val" class="font-mono text-slate-300">50</span>
                        </div>
                        <input type="range" id="N-slider" min="10" max="200" step="10" value="50" class="w-full accent-amber-500">
                    </div>

                    <!-- Longitud L -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-emerald-400 font-medium">Longitud ($L$)</span>
                            <span id="L-val" class="font-mono text-slate-300">0.50 m</span>
                        </div>
                        <input type="range" id="L-slider" min="0.1" max="1.0" step="0.05" value="0.5" class="w-full accent-emerald-500">
                    </div>

                    <!-- Corriente I -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-red-400 font-medium">Corriente ($I$)</span>
                            <span id="I-val" class="font-mono text-slate-300">10.0 A</span>
                        </div>
                        <input type="range" id="I-slider" min="-20" max="20" step="0.5" value="10" class="w-full accent-red-500">
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                 <button onclick="resetSim()" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-bold transition-colors border border-slate-700">
                    Reiniciar
                </button>
            </div>
        </aside>

        <!-- Center Area -->
        <div class="flex-1 flex flex-col relative bg-slate-950">
            <!-- 3D Canvas -->
            <div id="canvas-container" class="w-full h-1/2 border-b border-slate-800 relative cursor-move">
                <div class="absolute top-4 left-4 z-10 glass-panel px-3 py-2 rounded-lg pointer-events-none">
                    <div class="text-xs font-bold text-slate-400 mb-1">Visualización 3D (Solenoide)</div>
                    <div class="text-[10px] text-slate-500">Observa cómo el campo en el centro es uniforme.</div>
                </div>
            </div>

            <!-- Theory and Math (Bottom) -->
            <div class="w-full h-1/2 p-6 overflow-y-auto bg-slate-900 scrollbar-thin flex gap-6">
                
                <!-- Math Panel -->
                <div class="flex-1 min-w-[300px]">
                    <h3 class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        Ley de Ampere (Solenoide Ideal)
                    </h3>
                    <div class="glass-panel p-4 rounded-xl border-blue-500/30 border">
                        <div id="math-steps" class="space-y-3 text-sm text-slate-300 font-light">
                            <!-- Injected Math -->
                        </div>
                    </div>
                </div>

                <!-- Graphic Panel -->
                <div class="w-[45%] flex flex-col">
                    <h3 class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                        Magnitud $B_x$ en el eje (Real finito)
                    </h3>
                    <div class="flex-1 glass-panel rounded-xl p-3 relative">
                        <canvas id="chartCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // State
        const MU_0 = 4 * Math.PI * 1e-7;
        const R = 0.05; // Fixed radius 5cm
        let state = {
            N: 50,
            L: 0.5,
            I: 10.0
        };

        // UI Elements
        const nSlider = document.getElementById('N-slider');
        const lSlider = document.getElementById('L-slider');
        const iSlider = document.getElementById('I-slider');
        const nVal = document.getElementById('N-val');
        const lVal = document.getElementById('L-val');
        const iVal = document.getElementById('I-val');
        const mathSteps = document.getElementById('math-steps');

        // Three.js Setup
        let scene, camera, renderer, controls;
        let solenoidMesh;
        let bVectorsGroup;
        const container = document.getElementById('canvas-container');

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(3, 2, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            bVectorsGroup = new THREE.Group();
            scene.add(bVectorsGroup);

            const axes = new THREE.AxesHelper(1.5);
            scene.add(axes);

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            animate3D();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            controls.update();
            renderer.render(scene, camera);
        }

        function buildSolenoid() {
            if (solenoidMesh) scene.remove(solenoidMesh);
            
            // To prevent crashing from too many turns, we cap visual turns at 100
            const visualN = Math.min(state.N, 100); 
            const path = new THREE.CurvePath();
            
            class SolenoidCurve extends THREE.Curve {
                constructor(turns, length, radius) {
                    super();
                    this.turns = turns;
                    this.length = length;
                    this.radius = radius;
                }
                getPoint(t, optionalTarget = new THREE.Vector3()) {
                    const x = (t - 0.5) * this.length;
                    const angle = t * Math.PI * 2 * this.turns;
                    const y = Math.cos(angle) * this.radius;
                    const z = Math.sin(angle) * this.radius;
                    return optionalTarget.set(x, y, z);
                }
            }

            // Map lengths: 1m = 4 units in 3D
            const visualL = state.L * 4;
            const visualR = R * 10; // fixed visual radius

            const curve = new SolenoidCurve(visualN, visualL, visualR);
            // Limit tubular segments so it doesn't freeze (e.g. 10 segments per turn)
            const segments = visualN * 10; 
            const tubeGeo = new THREE.TubeGeometry(curve, segments, 0.02, 8, false);
            const tubeMat = new THREE.MeshBasicMaterial({ color: 0xb87333 }); // Copper
            solenoidMesh = new THREE.Mesh(tubeGeo, tubeMat);
            
            scene.add(solenoidMesh);
        }

        function buildVectors() {
            while(bVectorsGroup.children.length > 0) { bVectorsGroup.remove(bVectorsGroup.children[0]); }
            
            if (state.I === 0) return;

            const visualL = state.L * 4;
            const dirX = state.I > 0 ? 1 : -1;
            const vecDir = new THREE.Vector3(dirX, 0, 0);
            
            // Draw central B vectors
            const numArrows = 7;
            const spacing = visualL / (numArrows + 1);
            
            for (let i = 1; i <= numArrows; i++) {
                const xPos = -visualL/2 + i * spacing;
                // Fade vectors near edges to simulate finite effect
                const distanceToCenter = Math.abs(xPos);
                let scale = 1;
                if (distanceToCenter > (visualL/2)*0.8) scale = 0.5;
                
                const origin = new THREE.Vector3(xPos - (dirX*0.25), 0, 0);
                const arrow = new THREE.ArrowHelper(vecDir, origin, 0.5 * scale, 0x3b82f6, 0.15, 0.08);
                bVectorsGroup.add(arrow);
            }
        }

        // Chart Setup
        let bChart;
        function initChart() {
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            bChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Campo Bx (T)',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderWidth: 2,
                        tension: 0.1,
                        fill: true,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { title: { display: true, text: 'Posición Eje x (m)', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                        y: { title: { display: true, text: 'Campo Bx (T)', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', format: { notation: "scientific" } } }
                    }
                }
            });
        }

        function calculateBFinite(x) {
            // Finite Solenoid B(x) on axis
            const n = state.N / state.L;
            const L_half = state.L / 2;
            
            const term1 = (L_half - x) / Math.sqrt(R*R + Math.pow(L_half - x, 2));
            const term2 = (L_half + x) / Math.sqrt(R*R + Math.pow(L_half + x, 2));
            
            return (MU_0 * n * state.I / 2) * (term1 + term2);
        }

        function updateChart() {
            const numPoints = 60;
            // From -L to +L
            const maxRange = Math.max(state.L, 0.5);
            const xVals = Array.from({length: numPoints}, (_, i) => -maxRange + (i * (2*maxRange / (numPoints-1)))); 
            const B_vals = xVals.map(x => calculateBFinite(x));
            
            bChart.data.labels = xVals.map(x => x.toFixed(2));
            bChart.data.datasets[0].data = B_vals;
            
            bChart.update();
        }

        function updateUI() {
            nVal.innerText = state.N;
            lVal.innerText = `${state.L.toFixed(2)} m`;
            iVal.innerText = `${state.I.toFixed(1)} A`;

            // Ideal B inside
            const n = state.N / state.L;
            const B_ideal = MU_0 * n * state.I;

            let mathHtml = `
                <div class="text-center">
                    <span class="text-xs text-slate-400">Densidad de Vueltas ($n$)</span>
                    $$ n = \\frac{N}{L} = \\frac{${state.N}}{${state.L.toFixed(2)}} = ${n.toFixed(1)}\\ \\text{m}^{-1} $$
                </div>
                <div class="mt-3 text-center">
                    <span class="text-xs text-slate-400">Campo B en el centro (Ideal)</span>
                    $$ B = \\mu_0 n I $$
                </div>
                <div class="mt-3 border-l-4 border-blue-500 pl-3">
                    <div class="overflow-x-auto text-sm">
                        $$ B = (4\\pi \\times 10^{-7})(${n.toFixed(1)})(${state.I.toFixed(1)}) $$
                    </div>
                </div>
                <div class="bg-blue-500/10 p-3 rounded mt-4 border border-blue-500/20 text-center">
                    <span class="text-xs text-blue-400 uppercase tracking-wider font-bold">Campo Magnético $B$</span><br>
                    <span class="text-xl font-mono text-white">$$ B = ${B_ideal.toExponential(3)}\\ \\text{T} $$</span>
                </div>
            `;
            
            mathSteps.innerHTML = mathHtml;
            if (window.MathJax) MathJax.typesetPromise([mathSteps]);

            buildSolenoid();
            buildVectors();
            updateChart();
        }

        function handleInput() {
            state.N = parseInt(nSlider.value);
            state.L = parseFloat(lSlider.value);
            state.I = parseFloat(iSlider.value);
            updateUI();
        }

        function resetSim() {
            nSlider.value = 50;
            lSlider.value = 0.50;
            iSlider.value = 10;
            handleInput();
        }

        // Listeners
        nSlider.addEventListener('input', handleInput);
        lSlider.addEventListener('input', handleInput);
        iSlider.addEventListener('input', handleInput);

        // Init
        init3D();
        initChart();
        handleInput();

    </script>
</body>
</html>
