<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Flujo Eléctrico y Ley de Gauss Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.6.4/math.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #0f172a; }
        canvas { display: block; }
        .control-panel { scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
    </style>
</head>
<body class="text-white">

    <!-- UI Overlay -->
    <div id="ui" class="absolute inset-0 pointer-events-none flex flex-row justify-between p-4">
        
        <!-- Panel Izquierdo: Controles -->
        <div class="control-panel w-80 bg-slate-900/90 backdrop-blur-md p-6 rounded-xl border border-slate-700 pointer-events-auto overflow-y-auto max-h-full flex flex-col gap-5 shadow-2xl">
            <header>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">Ley de Gauss Pro</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-tighter">Interactúa directamente con los objetos</p>
            </header>

            <!-- Selección de Superficie -->
            <section class="space-y-3">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Superficie</h2>
                <select id="surfaceType" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm outline-none focus:ring-2 ring-blue-500">
                    <optgroup label="Abiertas">
                        <option value="rect">Rectángulo</option>
                        <option value="circle">Disco</option>
                    </optgroup>
                    <optgroup label="Cerradas">
                        <option value="cube">Cubo</option>
                        <option value="sphere">Cascarón Esférico</option>
                        <option value="cylinder">Cilindro</option>
                        <option value="irregular">Superficie Irregular</option>
                    </optgroup>
                </select>
                <div class="space-y-1">
                    <label class="block text-xs text-slate-400">Tamaño</label>
                    <input type="range" id="surfaceSize" min="0.5" max="4" step="0.1" value="2" class="w-full accent-blue-500">
                </div>
            </section>

            <!-- Configuración del Campo -->
            <section class="space-y-3 border-t border-slate-800 pt-4">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Campo Eléctrico</h2>
                <select id="fieldType" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm outline-none">
                    <option value="uniform">Campo Uniforme</option>
                    <option value="point">Carga Puntual</option>
                </select>

                <div id="uniformSettings" class="space-y-2">
                    <label class="block text-xs">Intensidad (E)</label>
                    <input type="range" id="fieldStrength" min="-5" max="5" step="0.1" value="2" class="w-full accent-yellow-500">
                </div>

                <div id="pointSettings" class="hidden space-y-2">
                    <label class="block text-xs">Carga (q)</label>
                    <input type="range" id="chargeValue" min="-10" max="10" step="1" value="5" class="w-full accent-yellow-500">
                    <p class="text-[10px] text-yellow-400 italic">Mueve la carga arrastrándola.</p>
                </div>
            </section>

            <section class="mt-auto bg-blue-900/20 p-4 rounded-lg border border-blue-500/30">
                <h3 class="text-blue-400 font-bold mb-1 text-sm">Análisis de Gauss</h3>
                <p id="theoryText" class="text-[11px] text-slate-300 leading-tight italic">
                    El flujo neto depende de la carga encerrada.
                </p>
            </section>
        </div>

        <!-- Panel Derecho: Datos -->
        <div class="w-72 space-y-4 pointer-events-none">
            <div class="bg-slate-900/90 backdrop-blur-md p-5 rounded-xl border border-slate-700 pointer-events-auto shadow-xl">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500 mb-3 text-center">Mediciones</h2>
                <div class="space-y-3">
                    <div class="p-3 bg-slate-800/50 rounded-lg text-center">
                        <span class="block text-[10px] text-slate-400 mb-1">FLUJO ELÉCTRICO NETO (Φ)</span>
                        <span id="fluxValue" class="text-4xl font-mono font-bold text-yellow-400">0.00</span>
                    </div>
                    <div id="fluxStatus" class="w-full text-center py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-gray-700">
                        Calculando...
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/90 backdrop-blur-md p-5 rounded-xl border border-slate-700 pointer-events-auto shadow-xl">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500 mb-2">Paso a paso</h2>
                <div id="calculationSteps" class="text-xs font-mono text-slate-300 space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-indigo-600 px-6 py-2 rounded-full text-sm font-medium shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        ¡Usa el mouse para arrastrar los objetos!
    </div>

    <script>
        // --- Variables Globales ---
        let scene, camera, renderer, controls, raycaster, mouse;
        let surface, chargeMesh, fieldGroup, normalArrow;
        let isDragging = false, draggedObject = null;
        let dragPlane = new THREE.Plane();
        let planeNormal = new THREE.Vector3();
        let intersectionPoint = new THREE.Vector3();
        
        let config = {
            fieldType: 'uniform',
            surfType: 'rect',
            fieldStrength: 2,
            chargeValue: 5,
            surfaceSize: 2
        };

        const COLORS = {
            positive: '#fbbf24',
            negative: '#ef4444',
            null: '#94a3b8',
            surface: 0x3b82f6,
            chargePos: 0xf87171,
            chargeNeg: 0x60a5fa
        };

        // --- Inicialización ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(6, 6, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            scene.add(new THREE.GridHelper(20, 20, 0x1e293b, 0x1e293b));

            fieldGroup = new THREE.Group();
            scene.add(fieldGroup);

            createSurface();
            createCharge();
            createField();
            
            setupInteractions();
            animate();
            
            setTimeout(() => showToast("Pasa el mouse sobre la carga para arrastrarla"), 1000);
        }

        function createSurface() {
            if (surface) {
                const pos = surface.position.clone();
                const rot = surface.rotation.clone();
                scene.remove(surface);
                surface.geometry.dispose();
                // Preservar posición al cambiar de tipo
                config.lastPos = pos;
                config.lastRot = rot;
            }

            let geometry;
            const s = config.surfaceSize;

            switch(config.surfType) {
                case 'rect': geometry = new THREE.PlaneGeometry(s, s); break;
                case 'circle': geometry = new THREE.CircleGeometry(s/2, 32); break;
                case 'cube': geometry = new THREE.BoxGeometry(s, s, s); break;
                case 'sphere': geometry = new THREE.SphereGeometry(s/2, 32, 32); break;
                case 'cylinder': geometry = new THREE.CylinderGeometry(s/3, s/3, s, 32); break;
                case 'irregular': 
                    geometry = new THREE.IcosahedronGeometry(s/2, 3);
                    const posAttr = geometry.attributes.position;
                    for (let i = 0; i < posAttr.count; i++) {
                        const v = new THREE.Vector3().fromBufferAttribute(posAttr, i);
                        v.normalize().multiplyScalar(s/2 * (0.8 + Math.random() * 0.4));
                        posAttr.setXYZ(i, v.x, v.y, v.z);
                    }
                    geometry.computeVertexNormals();
                    break;
            }

            const material = new THREE.MeshPhongMaterial({
                color: COLORS.surface,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide
            });

            surface = new THREE.Mesh(geometry, material);
            surface.name = "surface";
            if(config.lastPos) surface.position.copy(config.lastPos);
            if(config.lastRot) surface.rotation.copy(config.lastRot);
            scene.add(surface);

            if (normalArrow) scene.remove(normalArrow);
            if (['rect', 'circle'].includes(config.surfType)) {
                normalArrow = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,0), 1.2, 0xff0000);
                surface.add(normalArrow);
            }
        }

        function createCharge() {
            if (chargeMesh) scene.remove(chargeMesh);
            const geom = new THREE.SphereGeometry(0.3, 16, 16);
            const mat = new THREE.MeshBasicMaterial({ color: config.chargeValue >= 0 ? COLORS.chargePos : COLORS.chargeNeg });
            chargeMesh = new THREE.Mesh(geom, mat);
            chargeMesh.name = "charge";
            chargeMesh.position.set(-2, 2, 0);
            scene.add(chargeMesh);
        }

        function createField() {
            while(fieldGroup.children.length > 0) fieldGroup.remove(fieldGroup.children[0]);

            if (config.fieldType === 'uniform') {
                const spacing = 2.5;
                for (let x = -8; x <= 8; x += spacing) {
                    for (let y = -5; y <= 5; y += spacing) {
                        const dir = new THREE.Vector3(0, 0, config.fieldStrength >= 0 ? 1 : -1);
                        const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(x, y, 0), 1, 0x475569, 0.2, 0.1);
                        fieldGroup.add(arrow);
                    }
                }
            } else {
                const lines = 14;
                for (let i = 0; i < lines; i++) {
                    for (let j = 0; j < lines/2; j++) {
                        const u = (i/lines) * Math.PI * 2;
                        const v = (j/(lines/2)) * Math.PI;
                        const dir = new THREE.Vector3(Math.sin(v)*Math.cos(u), Math.sin(v)*Math.sin(u), Math.cos(v));
                        if (config.chargeValue < 0) dir.negate();
                        const arrow = new THREE.ArrowHelper(dir, chargeMesh.position, 1.3, config.chargeValue >= 0 ? 0xfc8181 : 0x63b3ed, 0.2, 0.1);
                        fieldGroup.add(arrow);
                    }
                }
            }
        }

        // --- Lógica de Interacción Mejorada ---
        function setupInteractions() {
            const onPointerDown = (e) => {
                updateMousePos(e);
                raycaster.setFromCamera(mouse, camera);
                
                const intersects = raycaster.intersectObjects([chargeMesh, surface]);
                if (intersects.length > 0) {
                    draggedObject = intersects[0].object;
                    isDragging = true;
                    controls.enabled = false; // Bloquear rotación de cámara
                    
                    // Definir plano de arrastre orientado a la cámara
                    camera.getWorldDirection(planeNormal);
                    planeNormal.negate();
                    dragPlane.setFromNormalAndCoplanarPoint(planeNormal, draggedObject.position);
                }
            };

            const onPointerMove = (e) => {
                updateMousePos(e);
                
                if (isDragging && draggedObject) {
                    raycaster.setFromCamera(mouse, camera);
                    if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                        draggedObject.position.copy(intersectionPoint);
                        if (draggedObject.name === "charge") createField();
                    }
                } else {
                    // Feedback visual al pasar el mouse
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObjects([chargeMesh, surface]);
                    renderer.domElement.style.cursor = intersects.length > 0 ? 'pointer' : 'grab';
                }
            };

            const onPointerUp = () => {
                isDragging = false;
                draggedObject = null;
                controls.enabled = true; // Liberar cámara
                renderer.domElement.style.cursor = 'grab';
            };

            const updateMousePos = (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            };

            window.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);
        }

        // --- Cálculos de Física ---
        function updatePhysics() {
            const stepsEl = document.getElementById('calculationSteps');
            const theoryEl = document.getElementById('theoryText');
            const fluxValueEl = document.getElementById('fluxValue');
            const statusEl = document.getElementById('fluxStatus');

            let flux = 0;
            const isOpen = ['rect', 'circle'].includes(config.surfType);

            if (config.fieldType === 'uniform') {
                if (isOpen) {
                    const area = config.surfType === 'rect' ? Math.pow(config.surfaceSize, 2) : Math.PI * Math.pow(config.surfaceSize/2, 2);
                    const normal = new THREE.Vector3(0, 0, 1).applyQuaternion(surface.quaternion);
                    const field = new THREE.Vector3(0, 0, config.fieldStrength);
                    const cosTheta = normal.dot(field.clone().normalize());
                    flux = config.fieldStrength * area * cosTheta;
                    theoryEl.innerText = "Superficie abierta: El flujo depende del ángulo de incidencia.";
                    stepsEl.innerHTML = `<div>• E = ${config.fieldStrength} N/C</div><div>• Área = ${area.toFixed(2)} m²</div><div>• cos(θ) = ${cosTheta.toFixed(2)}</div>`;
                } else {
                    flux = 0;
                    theoryEl.innerText = "Campo Uniforme: El flujo que entra es igual al que sale (Φ_neto = 0).";
                    stepsEl.innerHTML = `<div>• Superficie Cerrada</div><div>• Φ_neto = 0 (Gauss)</div>`;
                }
            } else {
                // Punto de carga
                const bbox = new THREE.Box3().setFromObject(surface);
                const isInsideBBox = bbox.containsPoint(chargeMesh.position);
                let reallyInside = false;

                if (isInsideBBox) {
                    if (config.surfType === 'sphere') {
                        reallyInside = chargeMesh.position.distanceTo(surface.position) < (config.surfaceSize/2);
                    } else if (config.surfType === 'cube') {
                        reallyInside = true;
                    } else {
                        const dir = new THREE.Vector3(1, 1, 1).normalize();
                        const ray = new THREE.Raycaster(chargeMesh.position, dir);
                        const hits = ray.intersectObject(surface);
                        reallyInside = (hits.length % 2 !== 0);
                    }
                }

                if (isOpen) {
                    const dist = chargeMesh.position.distanceTo(surface.position);
                    flux = (config.chargeValue / (1 + dist * 0.5)) * (reallyInside ? 1 : 0.3);
                    theoryEl.innerText = "Carga y superficie abierta: El flujo varía con la distancia.";
                } else {
                    flux = reallyInside ? config.chargeValue : 0;
                    theoryEl.innerText = reallyInside ? "¡Carga Encerrada! Hay flujo neto." : "Carga Exterior: Flujo neto cero.";
                    stepsEl.innerHTML = `<div>• Carga q = ${config.chargeValue}</div><div>• ¿Interior? ${reallyInside ? 'SÍ' : 'NO'}</div>`;
                }
            }

            fluxValueEl.innerText = flux.toFixed(2);
            if (Math.abs(flux) < 0.05) {
                statusEl.className = "w-full text-center py-1 rounded-full text-[10px] font-bold uppercase bg-slate-700";
                statusEl.innerText = "Flujo Nulo";
                fluxValueEl.style.color = COLORS.null;
            } else {
                const isPos = flux > 0;
                statusEl.className = `w-full text-center py-1 rounded-full text-[10px] font-bold uppercase ${isPos ? 'bg-yellow-600' : 'bg-red-600'}`;
                statusEl.innerText = isPos ? "Flujo Positivo" : "Flujo Negativo";
                fluxValueEl.style.color = isPos ? COLORS.positive : COLORS.negative;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updatePhysics();
            renderer.render(scene, camera);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 4000);
        }

        // --- Eventos de UI ---
        document.getElementById('surfaceType').addEventListener('change', (e) => {
            config.surfType = e.target.value;
            createSurface();
        });

        document.getElementById('surfaceSize').addEventListener('input', (e) => {
            config.surfaceSize = parseFloat(e.target.value);
            createSurface();
        });

        document.getElementById('fieldType').addEventListener('change', (e) => {
            config.fieldType = e.target.value;
            document.getElementById('uniformSettings').classList.toggle('hidden', config.fieldType !== 'uniform');
            document.getElementById('pointSettings').classList.toggle('hidden', config.fieldType !== 'point');
            createField();
        });

        document.getElementById('fieldStrength').addEventListener('input', (e) => {
            config.fieldStrength = parseFloat(e.target.value);
            createField();
        });

        document.getElementById('chargeValue').addEventListener('input', (e) => {
            config.chargeValue = parseFloat(e.target.value);
            chargeMesh.material.color.set(config.chargeValue >= 0 ? COLORS.chargePos : COLORS.chargeNeg);
            createField();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
