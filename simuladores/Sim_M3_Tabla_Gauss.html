<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus LMS - Electromagnetismo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes de Google -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>

    <!-- Babel para compilar JSX en tiempo real en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- Script principal de React usando ES Modules -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          BookOpen, ShieldAlert, GraduationCap, Play, 
          Activity, Save, Eraser, Lightbulb, Target, LayoutDashboard, RefreshCw,
          Eye, Clock, BarChart2, BrainCircuit, Timer, TrendingUp, AlertTriangle, Award,
          ArrowUp, ArrowDown, ArrowLeft, ArrowRight as ArrowRightIcon,
          ArrowUpRight, ArrowUpLeft, ArrowDownRight, ArrowDownLeft, MousePointer2,
          CheckCircle2, XCircle, Info, Hand, PenTool, User, ChevronDown
        } from 'https://esm.sh/lucide-react@0.292.0';
        
        // Importaciones oficiales de Firebase (Gstatic)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js';

        // --- 1. FIREBASE INITIALIZATION DUAL (Canvas + Producción) ---
        let firebaseConfig;
        
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
          // Si estamos en el Canvas, usamos la config de prueba para evitar el error 403 de Referrer
          firebaseConfig = JSON.parse(__firebase_config);
        } else {
          // Si lo subes a GitHub/Vercel, usará automáticamente TU configuración real
          firebaseConfig = {
            apiKey: "AIzaSyCI0c7KgnEAn-sV_CrHs0Er1LXL13CvQSA",
            authDomain: "laboratorio-de-coulomb.firebaseapp.com",
            databaseURL: "https://laboratorio-de-coulomb-default-rtdb.firebaseio.com",
            projectId: "laboratorio-de-coulomb",
            storageBucket: "laboratorio-de-coulomb.firebasestorage.app",
            messagingSenderId: "525944850850",
            appId: "1:525944850850:web:eca9c0b79809358e8d8afb",
            measurementId: "G-SZECJNG25E"
          };
        }

        const app = initializeApp(firebaseConfig);
        
        // Solo inicializamos Analytics si estamos en producción con MeasurementId
        let analytics = null;
        if (firebaseConfig.measurementId) {
            try { analytics = getAnalytics(app); } catch(e) { console.warn("Analytics error:", e); }
        }
        
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Usamos el ID del Canvas si existe, sino usamos el tuyo de producción
        const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : "electro-lms-v1";

        // --- 2. KATEX & THREE.JS HOOKS ---
        const useKaTeX = () => {
          useEffect(() => {
            if (!document.getElementById('katex-css')) {
              const link = document.createElement('link');
              link.id = 'katex-css'; link.rel = 'stylesheet';
              link.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css';
              document.head.appendChild(link);
              
              const script = document.createElement('script');
              script.id = 'katex-js'; script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js';
              document.head.appendChild(script);
            }
          }, []);
        };

        const useThreeJS = () => {
          const [loaded, setLoaded] = useState(false);
          useEffect(() => {
            if (window.THREE && window.THREE.OrbitControls) { setLoaded(true); return; }
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            script.onload = () => {
              const controls = document.createElement('script');
              controls.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js';
              controls.onload = () => setLoaded(true);
              document.head.appendChild(controls);
            };
            document.head.appendChild(script);
          }, []);
          return loaded;
        };

        // --- 3. COMPONENTS ---
        const Latex = ({ text, className = "", displayMode = false }) => {
          const containerRef = useRef(null);
          useEffect(() => {
            if (window.katex && containerRef.current && text) {
              try {
                if (displayMode) {
                   window.katex.render(text.toString(), containerRef.current, { displayMode: true, throwOnError: false });
                } else {
                  const html = text.toString()
                    .replace(/\$\$(.*?)\$\$/g, (m, eq) => window.katex.renderToString(eq, { displayMode: true, throwOnError: false }))
                    .replace(/\$(.*?)\$/g, (m, eq) => window.katex.renderToString(eq, { displayMode: false, throwOnError: false }));
                  containerRef.current.innerHTML = html;
                }
              } catch (e) { containerRef.current.innerText = text; }
            }
          }, [text, displayMode]);
          
          if (displayMode) return <div ref={containerRef} className={`my-3 text-center overflow-x-auto ${className}`} />;
          return <span ref={containerRef} className={className} dangerouslySetInnerHTML={{__html: text}} />;
        };

        // 3D Gauss Simulator
        const ThreeCanvas = ({ q1, q2, q3, q4 }) => {
          const mountRef = useRef(null);
          const isLoaded = useThreeJS();

          useEffect(() => {
            if (!isLoaded || !mountRef.current) return;
            const THREE = window.THREE;
            const width = mountRef.current.clientWidth;
            const height = mountRef.current.clientHeight;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color('#f8fafc'); 

            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.set(0, 5, 12);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            mountRef.current.innerHTML = '';
            mountRef.current.appendChild(renderer.domElement);

            const controls = new window.THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const s1Geo = new THREE.SphereGeometry(2, 32, 32);
            const s1Mat = new THREE.MeshPhysicalMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.15, side: THREE.DoubleSide, wireframe: true });
            const s1 = new THREE.Mesh(s1Geo, s1Mat);
            scene.add(s1);

            const s3Geo = new THREE.SphereGeometry(4.5, 32, 32);
            const s3Mat = new THREE.MeshPhysicalMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.1, side: THREE.DoubleSide, wireframe: true });
            const s3 = new THREE.Mesh(s3Geo, s3Mat);
            scene.add(s3);

            const createCharge = (val, pos) => {
              const color = val > 0 ? 0xef4444 : 0x0ea5e9;
              const geo = new THREE.SphereGeometry(0.35, 16, 16);
              const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.4 });
              const mesh = new THREE.Mesh(geo, mat);
              mesh.position.set(pos[0], pos[1], pos[2]);
              return mesh;
            };

            scene.add(createCharge(q1, [0, 0, 0])); 
            scene.add(createCharge(q2, [1, 1, -0.5])); 
            scene.add(createCharge(q3, [-3, -1, 1])); 
            scene.add(createCharge(q4, [2, -2, 2])); 

            let animationId;
            const animate = () => {
              animationId = requestAnimationFrame(animate);
              controls.update();
              s1.rotation.y += 0.002;
              s3.rotation.y -= 0.001;
              renderer.render(scene, camera);
            };
            animate();

            const handleResize = () => {
              if(!mountRef.current) return;
              camera.aspect = mountRef.current.clientWidth / mountRef.current.clientHeight;
              camera.updateProjectionMatrix();
              renderer.setSize(mountRef.current.clientWidth, mountRef.current.clientHeight);
            };
            window.addEventListener('resize', handleResize);

            return () => {
              cancelAnimationFrame(animationId);
              window.removeEventListener('resize', handleResize);
              renderer.dispose();
            };
          }, [isLoaded, q1, q2, q3, q4]);

          return (
            <div className="relative w-full aspect-square rounded-2xl overflow-hidden shadow-inner border-2 border-slate-200 cursor-move touch-none">
              <div ref={mountRef} className="w-full h-full" />
              <div className="absolute top-4 left-4 bg-white/90 backdrop-blur px-4 py-2 rounded-xl text-xs font-black text-slate-700 flex items-center gap-2 border border-slate-200 shadow-sm pointer-events-none uppercase tracking-widest">
                <Activity size={16} className="text-blue-500" />
                Orbita el sistema 3D
              </div>
            </div>
          );
        };

        // Interactive Vector Grid
        const InteractiveVectorField = ({ systemType, id, onChange, isSubmitted }) => {
          const TOOLS = [
            { rot: -90, icon: ArrowUp }, { rot: -45, icon: ArrowUpRight }, { rot: 0, icon: ArrowRightIcon }, { rot: 45, icon: ArrowDownRight },
            { rot: 90, icon: ArrowDown }, { rot: 135, icon: ArrowDownLeft }, { rot: 180, icon: ArrowLeft }, { rot: -135, icon: ArrowUpLeft },
            { rot: null, icon: Eraser, color: 'text-red-500' }
          ];

          const [activeTool, setActiveTool] = useState(0); 
          const [grid, setGrid] = useState({}); 
          const rows = 5, cols = 5;

          const handleCellClick = (r, c) => {
            if (isSubmitted) return;
            const key = `${r}-${c}`;
            const newGrid = { ...grid };
            if (activeTool === null) delete newGrid[key];
            else newGrid[key] = activeTool;
            setGrid(newGrid);
            if(onChange) onChange(id, newGrid);
          };

          return (
            <div className="flex flex-col h-full bg-slate-50/50 rounded-2xl border-2 border-slate-200 overflow-hidden shadow-inner">
              {!isSubmitted && (
                <div className="bg-white border-b-2 border-slate-200 p-3 flex flex-wrap justify-center gap-3">
                  <div className="text-xs font-black uppercase tracking-widest text-slate-400 flex items-center mr-2"><MousePointer2 size={16} className="mr-2"/> Selector:</div>
                  {TOOLS.map((tool, idx) => {
                    const Icon = tool.icon;
                    const isActive = activeTool === tool.rot;
                    return (
                      <button key={idx} onClick={() => setActiveTool(tool.rot)}
                        className={`p-2.5 rounded-xl transition-all border-2 ${isActive ? 'bg-blue-600 text-white border-blue-600 shadow-md scale-110' : 'bg-white text-slate-600 border-slate-200 hover:bg-blue-50 hover:border-blue-300'} ${tool.color || ''}`}
                      >
                        <Icon size={20} />
                      </button>
                    )
                  })}
                </div>
              )}
              <div className="relative flex-grow min-h-[350px] w-full p-6">
                {systemType === 'A' ? (
                  <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-14 h-14 bg-blue-50 border-4 border-blue-600 rounded-full flex items-center justify-center font-black text-blue-600 z-10 shadow-lg text-2xl"><Latex text={"$-Q$"}/></div>
                ) : (
                  <>
                    <div className="absolute top-1/2 left-[30%] -translate-x-1/2 -translate-y-1/2 w-14 h-14 bg-red-50 border-4 border-red-600 rounded-full flex items-center justify-center font-black text-red-600 z-10 shadow-lg text-2xl"><Latex text={"$+2Q$"}/></div>
                    <div className="absolute top-1/2 left-[70%] -translate-x-1/2 -translate-y-1/2 w-14 h-14 bg-blue-50 border-4 border-blue-600 rounded-full flex items-center justify-center font-black text-blue-600 z-10 shadow-lg text-2xl"><Latex text={"$-Q$"}/></div>
                  </>
                )}
                <div className="absolute inset-6 grid" style={{ gridTemplateColumns: `repeat(${cols}, 1fr)`, gridTemplateRows: `repeat(${rows}, 1fr)` }}>
                  {Array.from({ length: rows * cols }).map((_, i) => {
                    const r = Math.floor(i / cols), c = i % cols;
                    const isChargeArea = (systemType === 'A' && r === 2 && c === 2) || (systemType === 'B' && r === 2 && (c === 1 || c === 3));

                    return (
                      <div key={`${r}-${c}`} onClick={() => !isChargeArea && handleCellClick(r, c)}
                        className={`border border-slate-300/30 flex items-center justify-center transition-colors ${!isChargeArea && !isSubmitted ? 'hover:bg-blue-100/50 cursor-pointer' : ''}`}
                      >
                        {grid[`${r}-${c}`] !== undefined && (
                          <ArrowRightIcon size={32} className="text-slate-800 drop-shadow-md transition-transform" style={{ transform: `rotate(${grid[`${r}-${c}`]}deg)` }} />
                        )}
                        {grid[`${r}-${c}`] === undefined && !isChargeArea && (
                          <div className="w-2 h-2 bg-slate-200 rounded-full opacity-50"></div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        };

        // --- E-LEARNING INTERACTIVE COMPONENTS ---
        const ERadioGroup = ({ id, options, answers, handleInputChange, isSubmitted, expected }) => {
          const isCorrect = answers[id] === expected;
          return (
            <div className="space-y-3 mt-4">
              {options.map((opt) => {
                const isSelected = answers[id] === opt.val;
                let ringClass = "border-slate-200 hover:border-blue-400 hover:bg-blue-50";
                if (isSelected) ringClass = "border-blue-500 bg-blue-50 shadow-sm ring-2 ring-blue-500/20";
                
                if (isSubmitted) {
                  if (opt.val === expected) ringClass = "border-emerald-500 bg-emerald-50 shadow-sm ring-2 ring-emerald-500/20"; 
                  else if (isSelected && !isCorrect) ringClass = "border-red-500 bg-red-50 shadow-sm"; 
                  else ringClass = "border-slate-200 bg-slate-50 opacity-50"; 
                }

                return (
                  <button 
                    key={opt.val} disabled={isSubmitted}
                    onClick={() => handleInputChange(id, opt.val)}
                    className={`w-full text-left p-3 rounded-xl border-2 transition-all flex items-start gap-3 ${ringClass}`}
                  >
                    <div className={`mt-0.5 w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center ${isSelected ? 'border-blue-500' : 'border-slate-300'}`}>
                      {isSelected && <div className={`w-2.5 h-2.5 rounded-full ${isSubmitted ? (opt.val===expected ? 'bg-emerald-500' : 'bg-red-500') : 'bg-blue-500'}`} />}
                    </div>
                    <div className="text-sm font-medium text-slate-700 leading-snug"><Latex text={opt.label}/></div>
                    {isSubmitted && opt.val === expected && <CheckCircle2 className="text-emerald-500 ml-auto flex-shrink-0" size={20}/>}
                    {isSubmitted && isSelected && !isCorrect && <XCircle className="text-red-500 ml-auto flex-shrink-0" size={20}/>}
                  </button>
                );
              })}
            </div>
          );
        };

        const InlineSelect = ({ id, value, onChange, options, points, width="w-auto", isSubmitted, expected }) => {
          const [isOpen, setIsOpen] = useState(false);
          const dropdownRef = useRef(null);

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false);
            };
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
          }, []);

          const isCorrect = value === expected;
          let bgClass = "bg-white hover:bg-blue-50 border-slate-300";
          let textClass = "text-slate-800";
          
          if (isSubmitted) {
            bgClass = isCorrect ? "bg-emerald-50 border-emerald-500" : "bg-red-50 border-red-500";
            textClass = isCorrect ? "text-emerald-800" : "text-red-800";
          }

          const selectedOption = options.find(o => o.val === value);

          return (
            <span ref={dropdownRef} className={`inline-flex items-center gap-1 mx-1 relative group ${width}`}>
              <div className="relative w-full">
                <button 
                  type="button" disabled={isSubmitted} onClick={() => setIsOpen(!isOpen)}
                  className={`w-full px-4 py-2 min-h-[46px] text-base font-bold border-2 ${bgClass} ${textClass} rounded-xl outline-none transition-all shadow-sm flex items-center justify-between cursor-pointer disabled:cursor-default`}
                >
                  <span className="flex-grow text-center flex items-center justify-center">
                    {selectedOption ? <Latex text={selectedOption.label} /> : <span className="text-slate-400 font-normal text-sm">-- seleccione --</span>}
                  </span>
                  {!isSubmitted && <ChevronDown size={18} className={`text-slate-400 flex-shrink-0 transition-transform ml-2 ${isOpen ? 'rotate-180' : ''}`} />}
                </button>

                {isOpen && !isSubmitted && (
                  <div className="absolute z-[100] w-max min-w-full top-full mt-2 left-1/2 -translate-x-1/2 bg-white border-2 border-slate-200 rounded-xl shadow-2xl max-h-64 overflow-y-auto">
                    {options.map((o) => (
                      <div
                        key={o.val} onClick={() => { onChange(id, o.val); setIsOpen(false); }}
                        className="px-6 py-4 hover:bg-blue-50 cursor-pointer border-b border-slate-100 last:border-b-0 transition-colors text-center text-slate-800 font-bold flex items-center justify-center"
                      >
                        <Latex text={o.label} />
                      </div>
                    ))}
                  </div>
                )}
              </div>
              {!isSubmitted && <span className="text-[10px] font-black text-red-600 absolute -top-3 right-0 opacity-100 bg-red-50 px-1.5 py-0.5 rounded shadow-sm border border-red-100 z-10 pointer-events-none">[{points}]</span>}
            </span>
          );
        };

        const TipButton = ({ text, id, usedTips, setUsedTips }) => {
          const [isOpen, setIsOpen] = useState(false);
          const isUsed = usedTips.includes(id);

          const toggleTip = () => {
            if (!isUsed) setUsedTips(prev => [...prev, id]);
            setIsOpen(!isOpen);
          };

          return (
            <div className="mt-4">
              <button onClick={toggleTip} className={`flex items-center gap-2 text-sm font-bold px-4 py-2 rounded-xl transition-colors ${isOpen ? 'bg-amber-100 text-amber-800' : 'bg-white border-2 border-slate-200 text-slate-500 hover:border-amber-300 hover:text-amber-600'}`}>
                <Lightbulb size={16} className={isOpen ? 'text-amber-500' : ''}/> {isOpen ? 'Ocultar Pista' : '💡 Revelar Pista Pedagógica'}
              </button>
              {isOpen && (
                <div className="mt-3 p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-900 text-sm leading-relaxed animate-in slide-in-from-top-2">
                  <Latex text={text} />
                </div>
              )}
            </div>
          );
        };

        const SelectZone = ({ id, expected, answers, isSubmitted, activeDraggable, handleDropClick }) => {
          const isCorrect = answers[id] === expected;
          return (
            <div 
              onClick={() => handleDropClick(id)}
              className={`min-h-[48px] min-w-[100px] border-2 ${isSubmitted ? (isCorrect ? 'border-emerald-500 bg-emerald-50' : 'border-red-500 bg-red-50') : (activeDraggable ? 'border-blue-400 border-dashed bg-blue-50 cursor-pointer hover:bg-blue-100' : 'border-slate-200 border-dashed bg-slate-50 cursor-pointer hover:bg-slate-100')} rounded-xl flex items-center justify-center p-2 transition-all relative`}
            >
              {answers[id] ? (
                 <Latex text={`$${answers[id]}$`} className={`font-black text-lg ${isSubmitted ? (isCorrect ? 'text-emerald-700' : 'text-red-700') : 'text-blue-800'}`} />
              ) : (
                <span className="text-slate-400 text-xs font-bold uppercase tracking-wider flex items-center gap-1"><Hand size={12}/> Toca aquí</span>
              )}
              {isSubmitted && !isCorrect && expected && (
                <div className="absolute -top-4 -right-4 bg-white border border-slate-200 px-2 py-0.5 rounded-lg shadow-md text-xs text-slate-500 font-bold z-10 whitespace-nowrap">
                  Era: <Latex text={`$${expected}$`}/>
                </div>
              )}
            </div>
          );
        };

        const DraggableItem = ({ val, isSubmitted, activeDraggable, setActiveDraggable }) => (
          <button 
            disabled={isSubmitted}
            onClick={() => setActiveDraggable(val === activeDraggable ? null : val)}
            className={`px-4 py-2 rounded-xl border-2 font-black text-lg transition-all shadow-sm ${activeDraggable === val ? 'bg-blue-600 text-white border-blue-600 scale-110 shadow-blue-500/30' : 'bg-white text-slate-700 border-slate-200 hover:border-blue-400 hover:bg-blue-50 hover:text-blue-700 disabled:opacity-50 disabled:cursor-not-allowed'}`}
          >
            <Latex text={`$${val}$`} />
          </button>
        );

        const StyledInput = ({ id, placeholder, width="w-full", answers, handleInputChange, isSubmitted }) => (
          <input 
            type="text" value={answers[id] || ''} onChange={(e) => handleInputChange(id, e.target.value)} 
            placeholder={placeholder} disabled={isSubmitted}
            className={`${width} px-4 py-3 text-base border-2 ${isSubmitted ? 'border-slate-200 bg-slate-100 text-slate-500' : 'border-slate-300 focus:border-blue-600 bg-white focus:bg-blue-50'} rounded-xl outline-none transition-colors font-medium shadow-sm`}
          />
        );

        const MisionBox = ({ title, points, children }) => (
          <div className="mb-10 rounded-[2rem] border border-slate-300 bg-white shadow-lg relative">
            <div className="bg-slate-900 text-white px-8 py-5 flex flex-wrap justify-between items-center border-b-4 border-blue-600 gap-4 rounded-t-[calc(2rem-1px)]">
              <h3 className="font-black text-2xl tracking-tight">{title}</h3>
              <span className="text-sm font-black bg-white/10 px-4 py-1.5 rounded-lg text-amber-400 border border-amber-400/30">Valor: {points} pts</span>
            </div>
            <div className="p-8 md:p-10">
              {children}
            </div>
          </div>
        );

        // --- 5. SVG STATIC DIAGRAMS ---
        const SvgFriction = () => (
          <svg viewBox="0 0 100 100" className="w-full h-full max-h-[140px] drop-shadow-md">
            <rect x="10" y="10" width="40" height="80" rx="5" fill="#ffffff" stroke="#1e293b" strokeWidth="2.5"/>
            <text x="30" y="30" fontSize="10" textAnchor="middle" fill="#1e293b" fontWeight="bold">Paño</text>
            <text x="30" y="60" fontSize="16" textAnchor="middle" fill="#ef4444" fontWeight="black">++</text>
            <rect x="50" y="20" width="15" height="80" rx="3" fill="#ffffff" stroke="#1e293b" strokeWidth="2.5" transform="rotate(20 50 20)"/>
            <text x="80" y="50" fontSize="9" textAnchor="middle" fill="#1e293b" fontWeight="bold" transform="rotate(20 80 50)">Varilla</text>
            <text x="65" y="80" fontSize="16" textAnchor="middle" fill="#3b82f6" fontWeight="black" transform="rotate(20 65 80)">--</text>
            <path d="M 35 50 Q 50 35 65 50" fill="none" stroke="#1e293b" strokeWidth="2" markerEnd="url(#arrow-sm)"/>
            <text x="50" y="35" fontSize="12" textAnchor="middle" fill="#1e293b" fontWeight="bold">e⁻</text>
            <defs><marker id="arrow-sm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1e293b"/></marker></defs>
          </svg>
        );

        const SvgContact = () => (

            if(answers.t1 === 'Frotamiento') total += 0.02; if(answers.t2 === 'Contacto') total += 0.02; if(answers.t3 === 'Inducción') total += 0.02;

            checkG('g1_em', 'E_ins', 0.0125); checkG('g2_em', '0', 0.0125); checkG('g3_em', 'E_casc', 0.0125); checkG('g4_em', '0', 0.0125);

            total -= (usedTips.length * 0.02);
            return Math.max(Math.min(total, 4.0), 0).toFixed(2);

                                <div className="flex flex-col gap-1"><span className="text-xs font-bold text-slate-400 uppercase">Q_enc</span><InlineSelect id="g1_qe" value={answers.g1_qe} onChange={handleInputChange} isSubmitted={isSubmitted} expected="Q" width="w-full" options={gaussQencOpts} /></div>
                                <div className="flex flex-col gap-1"><span className="text-xs font-bold text-slate-400 uppercase">E(r)</span><InlineSelect id="g1_ee" value={answers.g1_ee} onChange={handleInputChange} isSubmitted={isSubmitted} expected="E_ext" width="w-full" options={gaussEOpts} /></div>
                              </td>
                              <td className="p-4 bg-white border-2 border-slate-200 rounded-2xl shadow-sm space-y-3">
                                <div className="flex flex-col gap-1"><span className="text-xs font-bold text-slate-400 uppercase">Q_enc</span><InlineSelect id="g2_qe" value={answers.g2_qe} onChange={handleInputChange} isSubmitted={isSubmitted} expected="Q" width="w-full" options={gaussQencOpts} /></div>
                                <div className="flex flex-col gap-1"><span className="text-xs font-bold text-slate-400 uppercase">E(r)</span><InlineSelect id="g2_ee" value={answers.g2_ee} onChange={handleInputChange} isSubmitted={isSubmitted} expected="E_ext" width="w-full" options={gaussEOpts} /></div>
                              </td>
                              <td className="p-4 bg-white border-2 border-slate-200 rounded-2xl shadow-sm space-y-3">
                                <div className="flex flex-col gap-1"><span className="text-xs font-bold text-slate-400 uppercase">Q_enc</span><InlineSelect id="g3_qe" value={answers.g3_qe} onChange={handleInputChange} isSubmitted={isSubmitted} expected="Q" width="w-full" options={gaussQencOpts} /></div>
                                <div className="flex flex-col gap-1"><span className="text-xs font-bold text-slate-400 uppercase">E(r)</span><InlineSelect id="g3_ee" value={answers.g3_ee} onChange={handleInputChange} isSubmitted={isSubmitted} expected="E_ext" width="w-full" options={gaussEOpts} /></div>
                              </td>
                              <td className="p-4 bg-white border-2 border-slate-200 rounded-2xl shadow-sm space-y-3">
                                <div className="flex flex-col gap-1"><span className="text-xs font-bold text-slate-400 uppercase">Q_enc</span><InlineSelect id="g4_qe" value={answers.g4_qe} onChange={handleInputChange} isSubmitted={isSubmitted} expected="Q" width="w-full" options={gaussQencOpts} /></div>
                                <div className="flex flex-col gap-1"><span className="text-xs font-bold text-slate-400 uppercase">E(r)</span><InlineSelect id="g4_ee" value={answers.g4_ee} onChange={handleInputChange} isSubmitted={isSubmitted} expected="E_ext" width="w-full" options={gaussEOpts} /></div>
                              </td>
                            </tr>
                            <tr className="h-4"></tr>

                            {/* Row 6: Potencial V(0) */}
                            <tr>
                              <td className="p-4 bg-slate-50 rounded-2xl border-2 border-slate-200 font-bold text-slate-700 shadow-inner">
                                <span className="block text-xs uppercase tracking-widest text-slate-400 mb-1">Paso VI [0.20 pts]</span>
                                Potencial <Latex text={"$V(0)$"} />
                              </td>
                              <td className="p-4 bg-white border-2 border-slate-200 rounded-2xl shadow-sm">
                                <StyledInput id="g1_pot" placeholder="Límites integral" answers={answers} handleInputChange={handleInputChange} isSubmitted={isSubmitted} width="w-full text-center text-sm" />
                              </td>
                              <td className="p-4 bg-white border-2 border-slate-200 rounded-2xl shadow-sm">
                                <StyledInput id="g2_pot" placeholder="Límites integral" answers={answers} handleInputChange={handleInputChange} isSubmitted={isSubmitted} width="w-full text-center text-sm" />
                              </td>
                              <td className="p-4 bg-white border-2 border-slate-200 rounded-2xl shadow-sm">
                                <StyledInput id="g3_pot" placeholder="Límites integral" answers={answers} handleInputChange={handleInputChange} isSubmitted={isSubmitted} width="w-full text-center text-sm" />
                              </td>
                              <td className="p-4 bg-white border-2 border-slate-200 rounded-2xl shadow-sm">
                                <StyledInput id="g4_pot" placeholder="Límites integral" answers={answers} handleInputChange={handleInputChange} isSubmitted={isSubmitted} width="w-full text-center text-sm" />
                              </td>
                            </tr>
                            <tr className="h-4"></tr>

                            {/* Row 7: Graficas */}
                            <tr>
                              <td className="p-4 bg-slate-50 rounded-2xl border-2 border-slate-200 font-bold text-slate-700 shadow-inner">
                                <span className="block text-xs uppercase tracking-widest text-slate-400 mb-1">Paso VII [0.50 pts]</span>
                                Gráfica <Latex text={"$E$"} /> vs <Latex text={"$r$"} />
                              </td>
                              <td className="p-2 bg-white border-2 border-slate-200 rounded-2xl shadow-sm">
                                <GraphSelector id="g1_graph" answers={answers} handleInputChange={handleInputChange} isSubmitted={isSubmitted} expected="linear_decay" />
                              </td>
                              <td className="p-2 bg-white border-2 border-slate-200 rounded-2xl shadow-sm">
                                <GraphSelector id="g2_graph" answers={answers} handleInputChange={handleInputChange} isSubmitted={isSubmitted} expected="zero_decay" />
                              </td>
                              <td className="p-2 bg-white border-2 border-slate-200 rounded-2xl shadow-sm">
                                <GraphSelector id="g3_graph" answers={answers} handleInputChange={handleInputChange} isSubmitted={isSubmitted} expected="zero_curve_decay" />
                              </td>
                              <td className="p-2 bg-white border-2 border-slate-200 rounded-2xl shadow-sm">
                                <GraphSelector id="g4_graph" answers={answers} handleInputChange={handleInputChange} isSubmitted={isSubmitted} expected="zero_zero_decay" />
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </MisionBox>

            <div className="text-center mt-24 pt-16 border-t-4 border-slate-200">
              {!isSubmitted ? (
                <button onClick={handleSubmit} className="bg-blue-600 hover:bg-blue-700 text-white px-16 py-6 rounded-3xl font-black text-2xl tracking-widest shadow-[0_10px_30px_rgba(37,99,235,0.4)] hover:shadow-[0_20px_40px_rgba(37,99,235,0.5)] transition-all hover:-translate-y-2 inline-flex items-center gap-4 border-b-8 border-blue-900 active:border-b-0 active:translate-y-2">
                  <Save size={32}/> PROCESAR EVALUACIÓN AL SERVIDOR
                </button>
              ) : (
                <div className="bg-emerald-50 text-emerald-800 border-2 border-emerald-200 p-8 rounded-3xl inline-flex items-center justify-center gap-6 shadow-sm w-full md:w-auto">
                  <CheckCircle2 size={48} className="text-emerald-500" />
                  <div className="text-left">
                    <p className="font-black text-3xl uppercase">Evaluación Procesada</p>
                    <p className="text-emerald-600 font-bold text-lg">Desplácese hacia arriba para ver el reporte de misión.</p>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* VIEW: RESULTS */}
      {view === 'results' && (
        <div className="max-w-4xl mx-auto mt-16 p-6 animate-in zoom-in-95 duration-500">
          <div className="bg-slate-900 rounded-[3rem] shadow-2xl overflow-hidden text-white relative border border-slate-800">
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[150%] h-[300px] bg-blue-600/20 blur-[120px] pointer-events-none rounded-full"></div>
            
            <div className="p-12 text-center relative z-10">
              <Award size={80} className={`mx-auto mb-8 drop-shadow-lg ${score >= 3.2 ? 'text-amber-400' : 'text-red-400'}`} />
              <h2 className="text-5xl font-black mb-4 uppercase tracking-tighter">Reporte de Misión</h2>
              <p className="text-slate-400 font-medium text-xl">Calificación procesada por el motor adaptativo neuronal.</p>

              <div className="my-16 flex justify-center">
                <div className="relative w-56 h-56 flex items-center justify-center bg-slate-800 rounded-full shadow-[0_0_80px_rgba(59,130,246,0.3)] border-8 border-slate-700">
                  <div className="text-center">
                    <span className="text-7xl font-black bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-400 drop-shadow-sm">{score}</span>
                    <span className="block text-base text-blue-400 mt-2 font-black tracking-widest">/ 4.0 PTS</span>
                  </div>
                </div>
              </div>

              {/* Pedagogical Feedback */}
              <div className={`max-w-3xl mx-auto p-8 rounded-3xl border-2 ${score >= 3.2 ? 'bg-emerald-900/40 border-emerald-500/50 text-emerald-100' : score >= 2.0 ? 'bg-blue-900/40 border-blue-500/50 text-blue-100' : 'bg-red-900/40 border-red-500/50 text-red-100'}`}>
                <h3 className="font-black text-2xl mb-4 flex items-center justify-center gap-3">
                  <BrainCircuit size={28}/> Mensaje de Calificación Pedagógica
                </h3>
                <p className="leading-relaxed text-lg font-medium">
                  {score >= 3.2 ? "¡Nivel Dios alcanzado! Tu dominio sobre los flujos vectoriales y la ley de Gauss es absoluto. Estás listo para topologías complejas y distribuciones asimétricas." : 
                   score >= 2.0 ? "Buen trabajo operativo. Sin embargo, hay vacíos conceptuales en las fronteras de Gauss. Analiza la diferencia entre Flujo Neto y el Principio de Superposición en el Campo Local." : 
                   "Anomalía detectada. El sistema adaptativo sugiere repasar urgentemente los mecanismos de polarización y el concepto de carga encerrada. ¡Vuelve a intentarlo, la física requiere iteración!"}
                </p>
                {usedTips.length > 0 && (
                  <div className="mt-4 pt-4 border-t border-current/20 text-sm font-bold opacity-80">
                    Penalización por {usedTips.length} pista(s) táctica(s) solicitada(s) aplicada.
                  </div>
                )}
              </div>

              {/* Metrics */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mt-14">
                <div className="bg-slate-800/80 p-6 rounded-2xl border border-slate-700/50 backdrop-blur-sm shadow-lg hover:-translate-y-1 transition-transform">
                  <Clock className="text-blue-400 mx-auto mb-3" size={32}/>
                  <p className="text-sm text-slate-400 font-bold uppercase tracking-wider mb-1">Tiempo Total</p>
                  <p className="text-2xl font-mono font-bold text-white">{formatTime(finalTime)}</p>
                </div>
                <div className="bg-slate-800/80 p-6 rounded-2xl border border-slate-700/50 backdrop-blur-sm shadow-lg hover:-translate-y-1 transition-transform">
                  <Timer className="text-violet-400 mx-auto mb-3" size={32}/>
                  <p className="text-sm text-slate-400 font-bold uppercase tracking-wider mb-1">Tiempo / Misión</p>
                  <p className="text-2xl font-mono font-bold text-white">{Math.floor(finalTime / 5)}s</p>
                </div>
                <div className="bg-slate-800/80 p-6 rounded-2xl border border-slate-700/50 backdrop-blur-sm shadow-lg hover:-translate-y-1 transition-transform">
                  <Target className="text-emerald-400 mx-auto mb-3" size={32}/>
                  <p className="text-sm text-slate-400 font-bold uppercase tracking-wider mb-1">Precisión</p>
                  <p className="text-2xl font-mono font-bold text-white">{Math.round((score/4.0) * 100)}%</p>
                </div>
                <div className="bg-slate-800/80 p-6 rounded-2xl border border-slate-700/50 backdrop-blur-sm shadow-lg hover:-translate-y-1 transition-transform">
                  <RefreshCw className="text-amber-400 mx-auto mb-3" size={32}/>
                  <p className="text-sm text-slate-400 font-bold uppercase tracking-wider mb-1">Estado en Nube</p>
                  <p className="text-lg font-black mt-1 text-amber-400 uppercase">Guardado</p>
                </div>
              </div>

              <div className="flex flex-col md:flex-row gap-6 justify-center mt-14">
                 <button onClick={() => { setView('exam'); window.scrollTo(0,0); }} className="bg-slate-800 hover:bg-slate-700 text-white font-black tracking-widest uppercase px-8 py-4 rounded-xl transition-all border border-slate-600 shadow-md hover:shadow-lg">
                  REVISAR CORRECCIONES EN LA HOJA
                </button>
                <button onClick={() => { setView('login'); setRole(null); }} className="bg-white hover:bg-slate-100 text-slate-900 font-black tracking-widest uppercase px-8 py-4 rounded-xl transition-all shadow-md hover:shadow-lg">
                  FINALIZAR Y SALIR
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* VIEW: TEACHER DASHBOARD */}
      {view === 'dashboard' && role === 'teacher' && (
        <div className="max-w-[1200px] mx-auto mt-12 px-6 animate-in fade-in duration-500 pb-20">
          <div className="mb-10">
            <h2 className="text-4xl font-black text-slate-900 tracking-tighter mb-2">Centro de Mando Docente</h2>
            <p className="text-slate-500 font-bold text-lg">Analíticas avanzadas para el ajuste pedagógico adaptativo.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 hover:shadow-lg transition-shadow">
              <div className="flex justify-between items-start mb-4">
                <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl"><Eye size={28}/></div>
                <span className="text-sm font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg">+12% hoy</span>
              </div>
              <h3 className="text-4xl font-black text-slate-800">{metrics.views}</h3>
              <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mt-1">Visitas al Módulo</p>
            </div>
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 hover:shadow-lg transition-shadow">
              <div className="flex justify-between items-start mb-4">
                <div className="p-4 bg-violet-50 text-violet-600 rounded-2xl"><BarChart2 size={28}/></div>
              </div>
              <h3 className="text-4xl font-black text-slate-800">{metrics.avgScore} / 4.0</h3>
              <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mt-1">Nota Promedio</p>
            </div>
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 hover:shadow-lg transition-shadow">
              <div className="flex justify-between items-start mb-4">
                <div className="p-4 bg-amber-50 text-amber-600 rounded-2xl"><Clock size={28}/></div>
              </div>
              <h3 className="text-4xl font-black text-slate-800">{formatTime(metrics.avgTime)}</h3>
              <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mt-1">T. Medio Examen</p>
            </div>
            <div className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 text-white relative overflow-hidden group">
              <TrendingUp className="absolute -right-6 -bottom-6 text-slate-800 group-hover:scale-110 transition-transform duration-500" size={120} />
              <div className="relative z-10">
                <h3 className="text-xl font-black mb-2 text-blue-400">IA de Ajuste Pedagógico</h3>
                <p className="text-base text-slate-300 mb-6 font-medium leading-snug">El sistema detecta una anomalía de aprendizaje.</p>
                <span className="bg-red-500 text-white text-sm font-black px-4 py-2 rounded-xl flex items-center gap-2 w-max shadow-md">
                  <AlertTriangle size={16}/> Fallo General: Ley de Gauss
                </span>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div className="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="px-8 py-6 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                <h3 className="font-black text-slate-800 text-xl">Métricas por Nivel</h3>
                <span className="text-xs text-slate-500 font-black uppercase tracking-widest bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm">Cuellos de botella</span>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-left">
                  <thead>
                    <tr className="text-xs uppercase tracking-widest text-slate-500 border-b-2 border-slate-100 bg-white">
                      <th className="px-8 py-5 font-black">Misión Evaluada</th>
                      <th className="px-8 py-5 font-black">Nota Media</th>
                      <th className="px-8 py-5 font-black">T. Medio</th>
                      <th className="px-8 py-5 font-black">Estado del Grupo</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-base font-bold bg-white">
                    {metrics.questionMetrics.map(q => (
                      <tr key={q.id} className="hover:bg-slate-50 transition-colors group">
                        <td className="px-8 py-6 text-slate-800 flex items-center gap-4">
                          <div className={`w-3 h-3 rounded-full shadow-inner ${q.status === 'optimal' ? 'bg-emerald-500' : q.status === 'review' ? 'bg-amber-500' : 'bg-red-500'}`}></div>
                          {q.title}
                        </td>
                        <td className="px-8 py-6 font-mono text-slate-600 text-lg">{q.avgScore}</td>
                        <td className="px-8 py-6 font-mono text-slate-500 flex items-center gap-2"><Timer size={16} className="text-slate-400"/> {q.avgTime}s</td>
                        <td className="px-8 py-6">
                          {q.status === 'optimal' ? <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">Óptimo</span> :
                           q.status === 'review' ? <span className="bg-amber-50 text-amber-700 border border-amber-200 px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">Revisar</span> :
                           <span className="bg-red-50 text-red-700 border border-red-200 px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">Crítico</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
              <div className="px-8 py-6 border-b border-slate-200 bg-slate-50">
                <h3 className="font-black text-slate-800 text-xl">Últimos Agentes</h3>
              </div>
              <div className="p-0 flex-grow bg-white">
                {metrics.attempts.map((a, idx) => (
                  <div key={idx} className="p-8 border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                    <div className="flex justify-between items-center mb-3">
                      <span className="font-black text-slate-800 text-lg">{a.agent}</span>
                      <span className={`font-mono font-black text-base px-3 py-1.5 rounded-lg border ${a.score > 2.0 ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-red-50 text-red-700 border-red-200 shadow-sm'}`}>{a.score} pts</span>
                    </div>
                    <div className="flex justify-between items-center text-sm text-slate-500 font-bold uppercase tracking-wider mt-2">
                      <span>{a.date}</span>
                      <span className="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-lg border border-slate-200"><Timer size={14}/> {formatTime(a.time)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
