<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Oscilador LC</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <!-- MathJax -->
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, svg: { fontCache: 'global' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; padding: 6px; border-radius: 6px; width: 100%; font-size: 0.85rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        input[type="range"] { accent-color: #ec4899; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center px-4 z-20 shrink-0 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-pink-500 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-pink-500/20">LC</div>
            <h1 class="text-lg font-bold text-white">Simulador <span class="text-pink-400">Circuito Tanque (Oscilador LC)</span></h1>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Controls Sidebar -->
        <aside class="w-80 glass-panel border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto z-10 p-4 space-y-6">
            
            <div>
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-700 pb-2">Componentes</h2>
                
                <div class="space-y-4">
                    <!-- Inductancia L -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-indigo-400 font-medium">Inductancia ($L$)</span>
                            <span id="l-val" class="font-mono text-slate-300">50 mH</span>
                        </div>
                        <input type="range" id="L-slider" min="10" max="200" step="10" value="50" class="w-full accent-indigo-500">
                    </div>

                    <!-- Capacitancia C -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-emerald-400 font-medium">Capacitancia ($C$)</span>
                            <span id="c-val" class="font-mono text-slate-300">20 µF</span>
                        </div>
                        <input type="range" id="C-slider" min="1" max="100" step="1" value="20" class="w-full accent-emerald-500">
                    </div>

                    <!-- Voltaje Inicial -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-pink-400 font-medium">Voltaje Inicial ($V_0$)</span>
                            <span id="v-val" class="font-mono text-slate-300">12 V</span>
                        </div>
                        <input type="range" id="V-slider" min="1" max="24" step="1" value="12" class="w-full accent-pink-500">
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                 <button id="anim-btn" class="w-full py-2 bg-pink-600 hover:bg-pink-500 text-white rounded-lg text-xs font-bold transition-colors shadow-lg mb-2">
                    Iniciar Oscilación
                </button>
            </div>
        </aside>

        <!-- Center Area -->
        <div class="flex-1 flex flex-col relative bg-slate-950">
            <!-- 2D Canvas SVG -->
            <div id="svg-container" class="w-full h-1/2 border-b border-slate-800 relative flex items-center justify-center bg-slate-900 overflow-hidden p-4">
                
                <svg viewBox="0 0 400 300" class="w-full h-full max-w-md drop-shadow-2xl">
                    <defs>
                        <!-- Glow effect -->
                        <filter id="glow-E" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="5" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                        <filter id="glow-B" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="5" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f43f5e" />
                        </marker>
                    </defs>

                    <!-- Wires -->
                    <path d="M 100 150 L 100 50 L 300 50 L 300 150 M 300 210 L 300 250 L 100 250 L 100 170" fill="none" stroke="#64748b" stroke-width="4"/>

                    <!-- Capacitor -->
                    <g id="capacitor">
                        <line x1="70" y1="150" x2="130" y2="150" stroke="#10b981" stroke-width="6"/>
                        <line x1="70" y1="170" x2="130" y2="170" stroke="#10b981" stroke-width="6"/>
                        <!-- E field lines between plates -->
                        <g id="e-field-lines" stroke="#10b981" stroke-width="2" opacity="1">
                            <line x1="80" y1="153" x2="80" y2="167"/>
                            <line x1="100" y1="153" x2="100" y2="167"/>
                            <line x1="120" y1="153" x2="120" y2="167"/>
                        </g>
                        <text x="50" y="165" fill="#10b981" font-size="20" font-weight="bold">C</text>
                        <!-- Charge signs -->
                        <text id="q-top" x="90" y="140" fill="#10b981" font-size="16" font-weight="bold">++++</text>
                        <text id="q-bot" x="95" y="190" fill="#10b981" font-size="16" font-weight="bold">----</text>
                    </g>

                    <!-- Inductor -->
                    <g id="inductor">
                        <path d="M 300 150 Q 330 160 300 170 Q 330 180 300 190 Q 330 200 300 210" fill="none" stroke="#6366f1" stroke-width="6"/>
                        <text x="340" y="185" fill="#6366f1" font-size="20" font-weight="bold">L</text>
                        <!-- B field glow around inductor -->
                        <circle cx="300" cy="180" r="30" fill="#6366f1" opacity="0" filter="url(#glow-B)" id="b-glow"/>
                    </g>

                    <!-- Current Indicator -->
                    <path id="i-arrow" d="M 120 50 L 280 50" fill="none" stroke="#f43f5e" stroke-width="3" stroke-dasharray="10,10" marker-end="url(#arrow)" opacity="0"/>
                    <text id="i-text" x="200" y="40" fill="#f43f5e" font-size="16" font-weight="bold" text-anchor="middle" opacity="0">I</text>

                </svg>

                <div class="absolute top-4 left-4 z-10 glass-panel px-3 py-2 rounded-lg pointer-events-none">
                    <div class="text-xs font-bold text-slate-400">Esquema 2D: Transferencia de Energía</div>
                    <div class="text-[10px] text-slate-500">La energía oscila entre Eléctrica ($U_E$) y Magnética ($U_B$).</div>
                </div>
            </div>

            <!-- Theory and Math (Bottom) -->
            <div class="w-full h-1/2 p-6 overflow-y-auto bg-slate-900 scrollbar-thin flex gap-6">
                
                <!-- Math Panel -->
                <div class="flex-1 min-w-[300px]">
                    <h3 class="text-xs font-bold text-pink-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        Frecuencia de Resonancia
                    </h3>
                    <div class="glass-panel p-4 rounded-xl border-pink-500/30 border">
                        <div id="math-steps" class="space-y-4 text-sm text-slate-300 font-light">
                            <!-- Injected Math -->
                        </div>
                    </div>
                </div>

                <!-- Graphic Panel -->
                <div class="flex-1 min-w-[300px] flex flex-col">
                    <h3 class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                        Carga $Q(t)$ y Corriente $I(t)$
                    </h3>
                    <div class="flex-1 glass-panel rounded-xl p-3 relative">
                        <canvas id="chartCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // State
        let state = {
            L: 50e-3, // H
            C: 20e-6, // F
            V0: 12, // V
            t: 0,
            animating: false,
            timeScale: 0.001 // Slow down time for visualization
        };

        // Q0 = C * V0
        // w = 1 / sqrt(LC)
        // Q(t) = Q0 * cos(wt)
        // I(t) = -dQ/dt = Q0 * w * sin(wt)

        // UI Elements
        const lSlider = document.getElementById('L-slider');
        const cSlider = document.getElementById('C-slider');
        const vSlider = document.getElementById('V-slider');
        const lVal = document.getElementById('l-val');
        const cVal = document.getElementById('c-val');
        const vVal = document.getElementById('v-val');
        const mathSteps = document.getElementById('math-steps');
        const animBtn = document.getElementById('anim-btn');
        
        // SVG
        const eFieldLines = document.getElementById('e-field-lines');
        const qTop = document.getElementById('q-top');
        const qBot = document.getElementById('q-bot');
        const bGlow = document.getElementById('b-glow');
        const iArrow = document.getElementById('i-arrow');
        const iText = document.getElementById('i-text');

        // Animation
        let lastTime = 0;
        function animate(time) {
            if (!state.animating) {
                lastTime = 0;
                return;
            }
            if (lastTime === 0) lastTime = time;
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            state.t += dt * state.timeScale;
            updateVisuals();
            
            requestAnimationFrame(animate);
        }

        function updateVisuals() {
            const Q0 = state.C * state.V0;
            const w = 1 / Math.sqrt(state.L * state.C);
            const Q = Q0 * Math.cos(w * state.t);
            const I = Q0 * w * Math.sin(w * state.t);
            const I0 = Q0 * w;

            // Update Capacitor (E Field & Charge)
            const chargeRatio = Q / Q0; // -1 to 1
            eFieldLines.setAttribute('opacity', Math.abs(chargeRatio).toString());
            if (chargeRatio > 0.1) {
                qTop.textContent = "++++";
                qBot.textContent = "----";
                qTop.setAttribute('opacity', chargeRatio);
                qBot.setAttribute('opacity', chargeRatio);
            } else if (chargeRatio < -0.1) {
                qTop.textContent = "----";
                qBot.textContent = "++++";
                qTop.setAttribute('opacity', Math.abs(chargeRatio));
                qBot.setAttribute('opacity', Math.abs(chargeRatio));
            } else {
                qTop.setAttribute('opacity', 0);
                qBot.setAttribute('opacity', 0);
            }

            // Update Inductor (B Field glow)
            const currentRatio = I / I0; // -1 to 1
            bGlow.setAttribute('opacity', (Math.abs(currentRatio) * 0.5).toString()); // Max 0.5 opacity

            // Update Current Arrow
            if (Math.abs(currentRatio) > 0.05) {
                iArrow.setAttribute('opacity', '1');
                iText.setAttribute('opacity', '1');
                if (currentRatio > 0) {
                    // Clockwise
                    iArrow.setAttribute('d', `M 120 50 L 280 50`);
                } else {
                    // Counter-clockwise
                    iArrow.setAttribute('d', `M 280 50 L 120 50`);
                }
            } else {
                iArrow.setAttribute('opacity', '0');
                iText.setAttribute('opacity', '0');
            }

            // Move the current point on chart
            if(chart) {
                chart.data.datasets[2].data = [{x: state.t * 1000, y: Q * 1e6}]; // Q point (uC)
                chart.data.datasets[3].data = [{x: state.t * 1000, y: I * 1000}]; // I point (mA)
                
                // Keep window moving
                const maxT = state.t * 1000;
                if(maxT > chart.options.scales.x.max) {
                    chart.options.scales.x.min += (maxT - chart.options.scales.x.max);
                    chart.options.scales.x.max = maxT;
                }
                chart.update('none'); // Update without animation for performance
            }
        }

        animBtn.addEventListener('click', () => {
            if (!state.animating) {
                state.animating = true;
                animBtn.innerText = "Detener Oscilación";
                animBtn.classList.replace('bg-pink-600', 'bg-red-600');
                generateChartData(); // Reset data
                requestAnimationFrame(animate);
            } else {
                state.animating = false;
                animBtn.innerText = "Iniciar Oscilación";
                animBtn.classList.replace('bg-red-600', 'bg-pink-600');
                state.t = 0; // reset
                chart.options.scales.x.min = 0;
                chart.options.scales.x.max = 50; // ms
                updateVisuals();
            }
        });

        // Chart Setup
        let chart;
        function initChart() {
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: 'Carga Q (µC)', data: [], borderColor: '#10b981', borderWidth: 2, pointRadius: 0 },
                        { label: 'Corriente I (mA)', data: [], borderColor: '#f43f5e', borderWidth: 2, pointRadius: 0 },
                        { label: 'Q Actual', data: [], backgroundColor: '#10b981', pointRadius: 5 },
                        { label: 'I Actual', data: [], backgroundColor: '#f43f5e', pointRadius: 5 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { labels: { color: '#cbd5e1' } } },
                    scales: {
                        x: { type: 'linear', title: { display: true, text: 'Tiempo (ms)', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' }, min: 0, max: 50 },
                        y: { title: { display: true, text: 'Magnitud', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function generateChartData() {
            const Q0 = state.C * state.V0;
            const w = 1 / Math.sqrt(state.L * state.C);
            
            let qData = [];
            let iData = [];
            // Generate 100ms of data
            for(let t = 0; t <= 0.1; t += 0.0005) {
                const Q = Q0 * Math.cos(w * t);
                const I = Q0 * w * Math.sin(w * t);
                qData.push({x: t * 1000, y: Q * 1e6}); // to uC
                iData.push({x: t * 1000, y: I * 1000}); // to mA
            }
            
            chart.data.datasets[0].data = qData;
            chart.data.datasets[1].data = iData;
            chart.update();
        }

        function updateUI() {
            lVal.innerText = `${(state.L * 1000).toFixed(0)} mH`;
            cVal.innerText = `${(state.C * 1e6).toFixed(0)} µF`;
            vVal.innerText = `${state.V0.toFixed(0)} V`;

            const w = 1 / Math.sqrt(state.L * state.C);
            const f = w / (2 * Math.PI); // Hz
            
            let html = `
                <div class="text-center">
                    <span class="text-xs text-slate-400">Frecuencia Angular $\\omega$</span>
                    $$ \\omega = \\frac{1}{\\sqrt{LC}} = \\frac{1}{\\sqrt{(${(state.L).toExponential(1)})(${(state.C).toExponential(1)})}} $$
                </div>
                <div class="bg-pink-500/10 p-3 rounded mt-4 border border-pink-500/20 text-center">
                    <span class="text-xs text-pink-400 uppercase tracking-wider font-bold">Frecuencia Natural ($f = \\frac{\\omega}{2\\pi}$)</span><br>
                    <span class="text-xl font-mono text-white">$$ f = ${f.toFixed(1)}\\ \\text{Hz} $$</span>
                </div>
            `;
            
            mathSteps.innerHTML = html;
            if (window.MathJax && !state.animating) MathJax.typesetPromise([mathSteps]);

            if (!state.animating) {
                generateChartData();
                state.t = 0;
                updateVisuals();
            }
        }

        function handleInput() {
            state.L = parseFloat(lSlider.value) * 1e-3;
            state.C = parseFloat(cSlider.value) * 1e-6;
            state.V0 = parseFloat(vSlider.value);
            updateUI();
        }

        // Listeners
        lSlider.addEventListener('input', handleInput);
        cSlider.addEventListener('input', handleInput);
        vSlider.addEventListener('input', handleInput);

        // Init
        initChart();
        handleInput();

    </script>
</body>
</html>
