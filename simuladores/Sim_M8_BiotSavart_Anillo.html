<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Biot-Savart: Espira Circular</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <!-- MathJax -->
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, svg: { fontCache: 'global' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; padding: 6px; border-radius: 6px; width: 100%; font-size: 0.85rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        input[type="range"] { accent-color: #ec4899; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center px-4 z-20 shrink-0 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-pink-500 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-pink-500/20">B</div>
            <h1 class="text-lg font-bold text-white">Simulador <span class="text-pink-400">Ley de Biot-Savart (Espira)</span></h1>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Controls Sidebar -->
        <aside class="w-80 glass-panel border-r border-slate-800 flex flex-col shrink-0 overflow-y-auto z-10 p-4 space-y-6">
            
            <div>
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-700 pb-2">Parámetros de la Espira</h2>
                
                <div class="space-y-4">
                    <!-- Corriente -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-blue-400 font-medium">Corriente ($I$)</span>
                            <span id="I-val" class="font-mono text-slate-300">5.0 A</span>
                        </div>
                        <input type="range" id="I-slider" min="-20" max="20" step="0.5" value="5" class="w-full accent-blue-500">
                    </div>

                    <!-- Radio -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-emerald-400 font-medium">Radio ($a$)</span>
                            <span id="a-val" class="font-mono text-slate-300">0.10 m</span>
                        </div>
                        <input type="range" id="a-slider" min="0.05" max="0.3" step="0.01" value="0.10" class="w-full accent-emerald-500">
                    </div>

                    <!-- Posición en eje x -->
                    <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-pink-400 font-medium">Distancia Axial ($x$)</span>
                            <span id="x-val" class="font-mono text-slate-300">0.00 m</span>
                        </div>
                        <input type="range" id="x-slider" min="-0.5" max="0.5" step="0.01" value="0" class="w-full accent-pink-500">
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                 <button onclick="resetSim()" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-bold transition-colors border border-slate-700">
                    Reiniciar
                </button>
            </div>
        </aside>

        <!-- Center Area -->
        <div class="flex-1 flex flex-col relative bg-slate-950">
            <!-- 3D Canvas -->
            <div id="canvas-container" class="w-full h-1/2 border-b border-slate-800 relative cursor-move">
                <div class="absolute top-4 left-4 z-10 glass-panel px-3 py-2 rounded-lg pointer-events-none">
                    <div class="text-xs font-bold text-slate-400 mb-1">Visualización 3D (Eje Axial)</div>
                    <div class="text-[10px] text-slate-500">El campo B apunta a lo largo del eje. Mueve la cámara.</div>
                </div>
            </div>

            <!-- Theory and Math (Bottom) -->
            <div class="w-full h-1/2 p-6 overflow-y-auto bg-slate-900 scrollbar-thin flex gap-6">
                
                <!-- Math Panel -->
                <div class="flex-1 min-w-[300px]">
                    <h3 class="text-xs font-bold text-pink-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        Cálculo del Campo en el Eje
                    </h3>
                    <div class="glass-panel p-4 rounded-xl border-pink-500/30 border">
                        <div id="math-steps" class="space-y-4 text-sm text-slate-300 font-light">
                            <!-- Injected Math -->
                        </div>
                    </div>
                </div>

                <!-- Graphic Panel -->
                <div class="w-[45%] flex flex-col">
                    <h3 class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                        Magnitud $B_x$ vs Distancia $x$
                    </h3>
                    <div class="flex-1 glass-panel rounded-xl p-3 relative">
                        <canvas id="chartCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // State
        const MU_0 = 4 * Math.PI * 1e-7;
        let state = {
            I: 5.0,
            a: 0.10,
            x: 0.0
        };

        // UI Elements
        const iSlider = document.getElementById('I-slider');
        const aSlider = document.getElementById('a-slider');
        const xSlider = document.getElementById('x-slider');
        const iVal = document.getElementById('I-val');
        const aVal = document.getElementById('a-val');
        const xVal = document.getElementById('x-val');
        const mathSteps = document.getElementById('math-steps');

        // Three.js Setup
        let scene, camera, renderer, controls;
        let ringMesh, bVectorHelper, pointMesh;
        const container = document.getElementById('canvas-container');

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(2, 2, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Ring
            const geometry = new THREE.TorusGeometry(1, 0.04, 16, 64);
            const material = new THREE.MeshBasicMaterial({ color: 0xb87333 }); // Copper
            ringMesh = new THREE.Mesh(geometry, material);
            ringMesh.rotation.y = Math.PI / 2; // YZ plane
            scene.add(ringMesh);

            // Point of measurement
            const pointGeo = new THREE.SphereGeometry(0.06, 16, 16);
            const pointMat = new THREE.MeshBasicMaterial({ color: 0x10b981 });
            pointMesh = new THREE.Mesh(pointGeo, pointMat);
            scene.add(pointMesh);

            // B Vector Helper
            bVectorHelper = new THREE.ArrowHelper(
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(0, 0, 0),
                1, 0xec4899, 0.2, 0.1
            );
            scene.add(bVectorHelper);

            // Axes
            const axes = new THREE.AxesHelper(1.5);
            scene.add(axes);
            
            // Draw axis line (dashed)
            const dashedMat = new THREE.LineDashedMaterial({ color: 0x64748b, dashSize: 0.1, gapSize: 0.05 });
            const points = [new THREE.Vector3(-2, 0, 0), new THREE.Vector3(2, 0, 0)];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(lineGeo, dashedMat);
            line.computeLineDistances();
            scene.add(line);

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            animate3D();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            controls.update();
            renderer.render(scene, camera);
        }

        function update3D() {
            // Visual mapping (0.1m -> 1 unit)
            const visualA = state.a * 10;
            ringMesh.scale.set(visualA, visualA, visualA);
            
            const visualX = state.x * 10;
            pointMesh.position.set(visualX, 0, 0);

            // Update Vector
            const B = calculateB(state.x);
            // Visual length scales with B but we want it readable
            let bMagVisual = Math.abs(B) * 5e4; 
            if (bMagVisual > 2) bMagVisual = 2; // cap length
            
            if (Math.abs(B) < 1e-12) {
                bVectorHelper.visible = false;
            } else {
                bVectorHelper.visible = true;
                const dirX = B > 0 ? 1 : -1;
                bVectorHelper.setDirection(new THREE.Vector3(dirX, 0, 0));
                bVectorHelper.position.set(visualX, 0, 0);
                bVectorHelper.setLength(bMagVisual, 0.2, 0.1);
            }
        }

        // Chart Setup
        let bChart;
        function initChart() {
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            bChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Campo Bx (T)',
                        data: [],
                        borderColor: '#ec4899',
                        backgroundColor: 'rgba(236, 72, 153, 0.2)',
                        borderWidth: 2,
                        tension: 0.4, // Smooth bell curve
                        fill: true,
                        pointRadius: 0
                    },
                    {
                        label: 'Posición Actual',
                        data: [],
                        borderColor: '#10b981',
                        backgroundColor: '#10b981',
                        pointRadius: 6,
                        showLine: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { title: { display: true, text: 'Distancia x (m)', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                        y: { title: { display: true, text: 'Campo Bx (T)', color: '#64748b' }, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', format: { notation: "scientific" } } }
                    }
                }
            });
        }

        function calculateB(x) {
            // Bx = (\mu_0 I a^2) / [2 * (a^2 + x^2)^(3/2)]
            const numerator = MU_0 * state.I * Math.pow(state.a, 2);
            const denominator = 2 * Math.pow(Math.pow(state.a, 2) + Math.pow(x, 2), 1.5);
            return numerator / denominator;
        }

        function updateChart() {
            const numPoints = 40;
            const xVals = Array.from({length: numPoints}, (_, i) => -0.5 + (i * (1.0 / (numPoints-1)))); 
            const B_vals = xVals.map(x => calculateB(x));
            
            bChart.data.labels = xVals.map(x => x.toFixed(2));
            bChart.data.datasets[0].data = B_vals;
            
            const currentB = calculateB(state.x);
            bChart.data.datasets[1].data = [{x: state.x.toFixed(2), y: currentB}];
            
            bChart.update();
        }

        function updateUI() {
            iVal.innerText = `${state.I.toFixed(1)} A`;
            aVal.innerText = `${state.a.toFixed(2)} m`;
            xVal.innerText = `${state.x.toFixed(2)} m`;

            const B = calculateB(state.x);

            let mathHtml = `
                <div class="text-center">
                    <span class="text-xs text-slate-400">Fórmula del Campo en el eje</span>
                    $$ B_x = \\frac{\\mu_0 I a^2}{2(a^2 + x^2)^{3/2}} $$
                </div>
                <div class="mt-4 border-l-4 border-pink-500 pl-3">
                    <div class="text-xs text-slate-400 mb-1">Evaluando valores:</div>
                    <div class="overflow-x-auto text-sm">
                        $$ B_x = \\frac{(4\\pi \\times 10^{-7})(${state.I})(${state.a}^2)}{2(${state.a}^2 + ${state.x}^2)^{3/2}} $$
                    </div>
                </div>
                <div class="bg-pink-500/10 p-3 rounded mt-4 border border-pink-500/20 text-center">
                    <span class="text-xs text-pink-400 uppercase tracking-wider font-bold">Campo Magnético $B_x$</span><br>
                    <span class="text-xl font-mono text-white">$$ B_x = ${B.toExponential(3)}\\ \\text{T} $$</span>
                </div>
            `;
            
            mathSteps.innerHTML = mathHtml;
            if (window.MathJax) MathJax.typesetPromise([mathSteps]);

            update3D();
            updateChart();
        }

        function handleInput() {
            state.I = parseFloat(iSlider.value);
            state.a = parseFloat(aSlider.value);
            state.x = parseFloat(xSlider.value);
            updateUI();
        }

        function resetSim() {
            iSlider.value = 5;
            aSlider.value = 0.10;
            xSlider.value = 0;
            handleInput();
        }

        // Listeners
        iSlider.addEventListener('input', handleInput);
        aSlider.addEventListener('input', handleInput);
        xSlider.addEventListener('input', handleInput);

        // Init
        init3D();
        initChart();
        handleInput();

    </script>
</body>
</html>
