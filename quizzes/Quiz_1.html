<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>physics10.easy - Motor Evaluativo Cognitivo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes de Google y Estilos Personalizados -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Barra de scroll elegante */
        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Efecto cuaderno */
        .cuaderno-shadow { box-shadow: 20px 20px 60px rgba(0,0,0,0.05), -5px 0px 15px rgba(0,0,0,0.02); }
        .lomo-cuaderno { border-left: 12px solid #ea580c; border-radius: 4px 24px 24px 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Barras de progreso animadas */
        .progress-bar-fill { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Efecto Timeline Procedimental */
        .step-container { border-left: 4px solid #e2e8f0; padding-left: 24px; position: relative; margin-bottom: 32px; z-index: 10; }
        .step-container::before { content: ''; position: absolute; left: -14px; top: 0; width: 24px; height: 24px; background: #fff; border: 4px solid #cbd5e1; border-radius: 50%; transition: all 0.3s; }
        .step-active { border-left-color: #ea580c; background: #fff7ed; transition: all 0.3s ease; z-index: 20; }
        .step-pending { border-left: 4px solid #cbd5e1; background: #f8fafc; opacity: 0.9; }

        /* Selectores integrados al texto */
        .inline-blank { display: inline-block; vertical-align: middle; margin: 0 6px; }
    </style>

    <!-- KaTeX cargado estáticamente -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          BookOpen, ShieldAlert, GraduationCap, Play, 
          Activity, Save, Eraser, Lightbulb, Target, LayoutDashboard, RefreshCw,
          Eye, Clock, BarChart2, BrainCircuit, Timer, TrendingUp, AlertTriangle, Award,
          ArrowUp, ArrowDown, ArrowLeft, ArrowRight as ArrowRightIcon,
          ArrowUpRight, ArrowUpLeft, ArrowDownRight, ArrowDownLeft, MousePointer2,
          CheckCircle as CheckCircle2, XCircle, Info, Hand, PenTool, User, ChevronDown, LogIn, Mail, ChevronRight, ChevronLeft,
          Brain, BarChart3, Settings, Star, Scissors, MessageSquare, BookOpenCheck,
          UserCircle, Building, Camera, Globe, FileText, ShieldCheck, ListChecks, Crosshair, Map, GitMerge, Move, Compass, Focus, TrendingDown,
          PieChart, Zap, Layers, Network
        } from 'https://esm.sh/lucide-react@0.292.0';
        
        // Firebase (Gstatic)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, setDoc, doc, getDocs, getDoc, serverTimestamp, query, orderBy, onSnapshot, increment } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js';

        // --- 1. FIREBASE INITIALIZATION ---
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
          firebaseConfig = JSON.parse(__firebase_config);
        } else {
          firebaseConfig = {
            apiKey: "AIzaSyCI0c7KgnEAn-sV_CrHs0Er1LXL13CvQSA",
            authDomain: "laboratorio-de-coulomb.firebaseapp.com",
            databaseURL: "https://laboratorio-de-coulomb-default-rtdb.firebaseio.com",
            projectId: "laboratorio-de-coulomb",
            storageBucket: "laboratorio-de-coulomb.firebasestorage.app",
            messagingSenderId: "525944850850",
            appId: "1:525944850850:web:eca9c0b79809358e8d8afb",
            measurementId: "G-SZECJNG25E"
          };
        }

        const app = initializeApp(firebaseConfig);
        let analytics = null;
        if (firebaseConfig.measurementId) {
            try { analytics = getAnalytics(app); } catch(e) {}
        }
        
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "quiz-coulomb-v9-cognitivedcl"; 

        // --- 2. KATEX HOOK ---
        const useKaTeX = () => {
          useEffect(() => {
            if (!document.getElementById('katex-css')) {
              const link = document.createElement('link');
              link.id = 'katex-css'; link.rel = 'stylesheet';
              link.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css';
              document.head.appendChild(link);
            }
          }, []);
        };

        const useThreeJS = () => {
          const [loaded, setLoaded] = useState(false);
          useEffect(() => {
            if (window.THREE && window.THREE.OrbitControls) { setLoaded(true); return; }
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            script.onload = () => {
              const controls = document.createElement('script');
              controls.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js';
              controls.onload = () => setLoaded(true);
              document.head.appendChild(controls);
            };
            document.head.appendChild(script);
          }, []);
          return loaded;
        };

        // --- 3. COMPONENTS ---
        const Latex = ({ text, className = "", displayMode = false }) => {
          const containerRef = useRef(null);
          useEffect(() => {
            if (window.katex && containerRef.current && text) {
              try {
                if (displayMode) {
                   window.katex.render(text.toString(), containerRef.current, { displayMode: true, throwOnError: false });
                } else {
                  const html = text.toString()
                    .replace(/\$\$(.*?)\$\$/g, (m, eq) => window.katex.renderToString(eq, { displayMode: true, throwOnError: false }))
                    .replace(/\$(.*?)\$/g, (m, eq) => window.katex.renderToString(eq, { displayMode: false, throwOnError: false }));
                  containerRef.current.innerHTML = html;
                }
              } catch (e) { containerRef.current.innerText = text; }
            } else if (containerRef.current) {
                containerRef.current.innerText = text;
            }
          }, [text, displayMode]);
          
          if (displayMode) return <div ref={containerRef} className={`my-3 text-center overflow-x-auto custom-scrollbar ${className}`} />;
          return <span ref={containerRef} className={className} dangerouslySetInnerHTML={{__html: text}} />;
        };

        // 3D Ring Simulator for Q3
        const ThreeRingCanvas = () => {
          const mountRef = useRef(null);
          const isLoaded = useThreeJS();

          useEffect(() => {
            if (!isLoaded || !mountRef.current) return;
            const THREE = window.THREE;
            const width = mountRef.current.clientWidth;
            const height = mountRef.current.clientHeight;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color('#f8fafc'); 

            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.set(5, 5, 8);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            mountRef.current.innerHTML = '';
            mountRef.current.appendChild(renderer.domElement);

            const controls = new window.THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // Ring Geometry
            const ringGeo = new THREE.TorusGeometry(3, 0.15, 16, 100);
            const ringMat = new THREE.MeshPhysicalMaterial({ color: 0xd97706, roughness: 0.1, metalness: 0.5 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.y = Math.PI / 2;
            scene.add(ring);

            // Point P
            const pointGeo = new THREE.SphereGeometry(0.2, 16, 16);
            const pointMat = new THREE.MeshBasicMaterial({ color: 0x0f172a });
            const point = new THREE.Mesh(pointGeo, pointMat);
            point.position.set(4, 0, 0); 
            scene.add(point);

            // Axis line
            const points = [];
            points.push(new THREE.Vector3(-2, 0, 0));
            points.push(new THREE.Vector3(6, 0, 0));
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineDashedMaterial({ color: 0x64748b, dashSize: 0.2, gapSize: 0.1 });
            const line = new THREE.Line(lineGeo, lineMat);
            line.computeLineDistances();
            scene.add(line);

            let animationId;
            const animate = () => {
              animationId = requestAnimationFrame(animate);
              controls.update();
              ring.rotation.z += 0.01;
              renderer.render(scene, camera);
            };
            animate();

            const handleResize = () => {
              if(!mountRef.current) return;
              camera.aspect = mountRef.current.clientWidth / mountRef.current.clientHeight;
              camera.updateProjectionMatrix();
              renderer.setSize(mountRef.current.clientWidth, mountRef.current.clientHeight);
            };
            window.addEventListener('resize', handleResize);

            return () => {
              cancelAnimationFrame(animationId);
              window.removeEventListener('resize', handleResize);
              renderer.dispose();
            };
          }, [isLoaded]);

          return (
            <div className="relative w-full aspect-square rounded-2xl overflow-hidden shadow-inner border-2 border-slate-200 cursor-move touch-none">
              <div ref={mountRef} className="w-full h-full" />
              <div className="absolute top-4 left-4 bg-white/90 backdrop-blur px-4 py-2 rounded-xl text-xs font-black text-slate-700 flex items-center gap-2 border border-slate-200 shadow-sm pointer-events-none uppercase tracking-widest">
                <Activity size={16} className="text-orange-500" />
                Simulador de Campo Vectorial 3D
              </div>
            </div>
          );
        };

        const InlineSelect = ({ id, value, onChange, options, width="w-auto", isSubmitted, expected }) => {
          const [isOpen, setIsOpen] = useState(false);
          const dropdownRef = useRef(null);

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false);
            };
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
          }, []);

          const isCorrect = isSubmitted && value === expected;
          const isWrong = isSubmitted && value !== expected;
          
          let bgClass = "bg-white hover:bg-orange-50 border-slate-300";
          let textClass = "text-slate-800";
          
          if (isCorrect) { bgClass = "bg-emerald-50 border-emerald-500"; textClass = "text-emerald-800"; }
          if (isWrong) { bgClass = "bg-red-50 border-red-500"; textClass = "text-red-800"; }

          const selectedOption = options.find(o => o.val === value);

          return (
            <span ref={dropdownRef} className={`inline-flex items-center gap-1 relative group ${width} inline-blank`}>
              <div className="relative w-full">
                <button 
                  type="button" disabled={isSubmitted} onClick={() => setIsOpen(!isOpen)}
                  className={`w-full px-3 py-2 min-h-[40px] text-sm md:text-base font-bold border-2 ${bgClass} ${textClass} rounded-xl outline-none transition-all shadow-sm flex items-center justify-between cursor-pointer disabled:cursor-default`}
                >
                  <span className="flex-grow text-center flex items-center justify-center overflow-hidden">
                    {selectedOption ? <Latex text={selectedOption.label} /> : <span className="text-slate-400 font-normal text-xs whitespace-nowrap">Seleccionar...</span>}
                  </span>
                  {!isSubmitted && <ChevronDown size={14} className={`text-slate-400 flex-shrink-0 transition-transform ml-2 ${isOpen ? 'rotate-180' : ''}`} />}
                </button>

                {isOpen && !isSubmitted && (
                  <div className="absolute z-[100] w-max min-w-full top-full mt-2 left-1/2 -translate-x-1/2 bg-white border-2 border-slate-200 rounded-xl shadow-2xl max-h-64 overflow-y-auto custom-scrollbar">
                    {options.map((o) => (
                      <div
                        key={o.val} onClick={() => { onChange(id, o.val); setIsOpen(false); }}
                        className="px-4 py-3 hover:bg-orange-50 cursor-pointer border-b border-slate-100 last:border-b-0 transition-colors text-center text-slate-800 font-bold flex items-center justify-center text-sm md:text-base"
                      >
                        <Latex text={o.label} />
                      </div>
                    ))}
                  </div>
                )}
                {isWrong && expected && (
                   <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-white border border-slate-200 px-2 py-1 rounded shadow-md text-[10px] text-red-600 font-bold z-10 whitespace-nowrap">
                      Era: <Latex text={options.find(o=>o.val===expected)?.label || ''}/>
                   </div>
                )}
              </div>
            </span>
          );
        };

        const StyledInput = ({ id, placeholder, width="w-full", answers, handleInputChange, isSubmitted, expected }) => {
            const isCorrect = isSubmitted && answers[id] === expected;
            const isWrong = isSubmitted && answers[id] !== expected;
            
            let bgClass = "bg-white border-slate-300 focus:border-orange-500 focus:bg-orange-50";
            if (isCorrect) bgClass = "bg-emerald-50 border-emerald-500 text-emerald-800";
            if (isWrong) bgClass = "bg-red-50 border-red-500 text-red-800";

            return (
              <div className="relative w-full">
                <input 
                  type="text" value={answers[id] || ''} onChange={(e) => handleInputChange(id, e.target.value)} 
                  placeholder={placeholder} disabled={isSubmitted}
                  className={`${width} px-4 py-3 text-base border-2 rounded-xl outline-none transition-colors font-medium shadow-sm ${bgClass}`}
                />
                {isWrong && expected && (
                   <div className="absolute -top-6 right-0 bg-white border border-slate-200 px-2 py-1 rounded shadow-md text-xs text-red-600 font-bold z-10">
                      Era: {expected}
                   </div>
                )}
              </div>
            )
        };

        // --- NEW COMPONENT: CognitiveDCL (Cognitivo Interactivo) ---
        // El alumno da clic en un cuadrante vacío, se dibuja un vector y debe asignarle una etiqueta matemática
        const CognitiveDCL = ({ idPrefix, options, answers, onChange, isSubmitted, expectedMap }) => {
            const nodes = [
                { dir: 'N', cx: 0, cy: -80 },
                { dir: 'NE', cx: 56, cy: -56 },
                { dir: 'E', cx: 80, cy: 0 },
                { dir: 'SE', cx: 56, cy: 56 },
                { dir: 'S', cx: 0, cy: 80 },
                { dir: 'SW', cx: -56, cy: 56 },
                { dir: 'W', cx: -80, cy: 0 },
                { dir: 'NW', cx: -56, cy: -56 }
            ];

            // Blindaje de seguridad para evitar caídas de React
            const safeExpectedMap = expectedMap || {};

            const toggleNode = (dir) => {
                if (isSubmitted) return;
                const currentVal = answers[`${idPrefix}_${dir}`];
                if (currentVal !== undefined) {
                    onChange(`${idPrefix}_${dir}`, undefined); // Remove
                } else {
                    onChange(`${idPrefix}_${dir}`, ''); // Add empty
                }
            };

            return (
                <div className="bg-slate-50 border-2 border-slate-200 p-6 rounded-2xl shadow-inner flex flex-col items-center w-full">
                    <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <Compass size={16}/> Constructor de Diagrama de Cuerpo Libre
                    </p>
                    <p className="text-[11px] text-slate-500 mb-6 text-center max-w-sm font-bold">Haz clic en el cuadrante o eje donde interactúa una fuerza/campo, y luego selecciona su etiqueta matemática.</p>

                    <div className="relative w-full max-w-[320px] aspect-square bg-white rounded-full shadow-lg border-4 border-slate-100 p-4 mx-auto mb-4">
                        <svg viewBox="-100 -100 200 200" className="w-full h-full overflow-visible absolute inset-0">
                            <defs>
                                <marker id={`arr_${idPrefix}`} viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
                            </defs>
                            {/* Ejes Cartesianos Ténues */}
                            <line x1="-100" y1="0" x2="100" y2="0" stroke="#f1f5f9" strokeWidth="2" />
                            <line x1="0" y1="-100" x2="0" y2="100" stroke="#f1f5f9" strokeWidth="2" />
                            <circle cx="0" cy="0" r="4" fill="#94a3b8" />
                            
                            {/* Dibuja las líneas activas primero para que queden bajo los HTML overlays */}
                            {nodes.map(n => {
                                const isActive = answers[`${idPrefix}_${n.dir}`] !== undefined;
                                if(isActive) return <line key={`l_${n.dir}`} x1="0" y1="0" x2={n.cx} y2={n.cy} stroke="#ea580c" strokeWidth="3" markerEnd={`url(#arr_${idPrefix})`} />;
                                return null;
                            })}
                        </svg>

                        {/* HTML Overlays para interacciones puras */}
                        <div className="absolute inset-0">
                            {nodes.map(n => {
                                const val = answers[`${idPrefix}_${n.dir}`];
                                const isActive = val !== undefined;
                                const isCorrect = isSubmitted && val === safeExpectedMap[n.dir];
                                const isWrong = isSubmitted && val !== safeExpectedMap[n.dir] && safeExpectedMap[n.dir] !== undefined;
                                const missed = isSubmitted && !isActive && safeExpectedMap[n.dir] !== undefined;

                                const left = `${(n.cx + 100) / 2}%`;
                                const top = `${(n.cy + 100) / 2}%`;

                                return (
                                    <div key={`n_${n.dir}`} className="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-1" style={{ left, top }}>
                                        {!isActive ? (
                                            <button 
                                                type="button" disabled={isSubmitted} onClick={() => toggleNode(n.dir)} 
                                                className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors shadow-sm z-10 ${missed ? 'bg-red-100 border-2 border-red-400 animate-pulse' : 'bg-slate-100 hover:bg-orange-200 border-2 border-white'}`}
                                            >
                                                {missed ? <XCircle size={16} className="text-red-500"/> : <div className="w-2 h-2 bg-slate-300 rounded-full"></div>}
                                            </button>
                                        ) : (
                                            <div className="flex flex-col items-center z-30">
                                                {!isSubmitted && (
                                                    <button type="button" onClick={() => toggleNode(n.dir)} className="w-5 h-5 bg-red-500 hover:bg-red-600 rounded-full text-white flex items-center justify-center text-xs shadow-md mb-1 cursor-pointer transition-transform hover:scale-110">×</button>
                                                )}
                                                <div className={`p-1 rounded-xl bg-white shadow-lg border-2 ${isCorrect ? 'border-emerald-500' : isWrong ? 'border-red-500' : 'border-orange-200'}`}>
                                                    <InlineSelect id={`${idPrefix}_${n.dir}`} value={val} onChange={onChange} options={options} isSubmitted={isSubmitted} expected={safeExpectedMap[n.dir]} width="w-24 md:w-32" />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                    {isSubmitted && <div className="text-xs text-slate-400 font-bold mt-4">Los nodos parpadeantes rojos indican vectores que omitiste dibujar.</div>}
                </div>
            )
        }

        const PenaltyTipButton = ({ text, id, usedTips, setUsedTips, penalty = 0.05 }) => {
          const [isOpen, setIsOpen] = useState(false);
          const isUsed = usedTips.includes(id);

          const toggleTip = () => {
            if (!isUsed) {
                const confirm = window.confirm(`ATENCIÓN ACADÉMICA:\n\nRevelar esta pista estructural deducirá ${penalty} pts de tu calificación final por asistencia cognitiva.\n\n¿Estás seguro que deseas usarla?`);
                if (!confirm) return;
                setUsedTips(prev => [...prev, id]);
            }
            setIsOpen(!isOpen);
          };

          return (
            <div className="mt-6">
              <button onClick={toggleTip} className={`flex items-center gap-2 text-sm font-bold px-5 py-3 rounded-xl transition-colors shadow-sm ${isOpen ? 'bg-amber-100 text-amber-800 border-2 border-amber-300' : 'bg-white border-2 border-amber-200 text-amber-600 hover:bg-amber-50 hover:border-amber-400'}`}>
                <Lightbulb size={18} className={isOpen ? 'text-amber-500' : 'text-amber-400'}/> 
                {isOpen ? 'Ocultar Asistencia Cognitiva' : `💡 Asistencia Cognitiva (-${penalty} pts)`}
              </button>
              {isOpen && (
                <div className="mt-3 p-5 bg-amber-50 border-2 border-amber-200 rounded-xl text-amber-900 text-sm leading-relaxed animate-in slide-in-from-top-2 shadow-inner">
                  <Latex text={text} />
                </div>
              )}
            </div>
          );
        };

        const CurveSelector = ({ id, answers, handleInputChange, isSubmitted, expected }) => {
          const options = [
            { val: 'inv_sq', svg: <SvgGraphInverseSquare/> },
            { val: 'linear', svg: <SvgGraphLinear/> },
            { val: 'constant', svg: <SvgGraphConstant/> }
          ];
          const isCorrect = answers[id] === expected;
          return (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-2 mt-2">
              {options.map(opt => {
                const isSelected = answers[id] === opt.val;
                let ringClass = "border-slate-200 hover:border-orange-400 bg-white";
                if (isSelected) ringClass = "border-orange-500 bg-orange-50 ring-2 ring-orange-500/20 shadow-md scale-105 z-10";
                if (isSubmitted) {
                  if (opt.val === expected) ringClass = "border-emerald-500 bg-emerald-50 ring-2 ring-emerald-500/20";
                  else if (isSelected && !isCorrect) ringClass = "border-red-500 bg-red-50";
                  else ringClass = "border-slate-200 opacity-40 bg-white";
                }
                return (
                  <button type="button" key={opt.val} disabled={isSubmitted} onClick={() => handleInputChange(id, opt.val)}
                    className={`p-3 rounded-xl border-2 transition-all flex justify-center items-center ${ringClass} text-slate-600`}
                  >
                    {opt.svg}
                  </button>
                )
              })}
            </div>
          );
        }

        const MisionBox = ({ title, points, children }) => (
          <div className="mb-12 rounded-[2rem] border border-slate-300 bg-white shadow-lg relative overflow-visible">
            <div className="bg-slate-900 text-white px-8 py-5 flex flex-wrap justify-between items-center border-b-4 border-orange-600 gap-4 rounded-t-[calc(2rem-1px)]">
              <h3 className="font-black text-2xl tracking-tight">{title}</h3>
              <span className="text-sm font-black bg-white/10 px-4 py-1.5 rounded-lg text-amber-400 border border-amber-400/30 shadow-inner">Valor: {points} pts</span>
            </div>
            <div className="p-6 md:p-10">
              {children}
            </div>
          </div>

        // --- 5. SVG STATIC DIAGRAMS ---

              <div className="relative z-10">
                <h3 className="text-xl font-black mb-2 text-orange-400">IA de Ajuste Pedagógico</h3>
                <p className="text-base text-slate-300 mb-6 font-medium leading-snug">Índice de Frustración: <span className="font-mono text-xl">{metrics.frustrationIndex}</span></p>
                <span className={`text-white text-sm font-black px-4 py-2 rounded-xl flex items-center gap-2 w-max shadow-md ${metrics.frustrationIndex > 5 ? 'bg-red-500' : 'bg-emerald-500'}`}>
                  {metrics.frustrationIndex > 5 ? <AlertTriangle size={16}/> : <Activity size={16}/>}
                  {metrics.frustrationIndex > 5 ? 'Alerta: Alta Frustración' : 'Monitoreo Activo Óptimo'}
                </span>
              </div>
            </div>
          </div>

          {/* ADVANCED DATA SCIENCE SECTION */}
          <MisionBox title="Analítica Avanzada: Psicometría y Data Science" points="PRO">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                  
                  {/* Teoria de Respuesta al Item (IRT) */}
                  <div className="bg-slate-50 p-6 rounded-2xl border-2 border-slate-200 shadow-inner">
                      <div className="flex items-center gap-3 mb-6">
                          <Network className="text-blue-600" size={28} />
                          <div>
                              <h4 className="font-black text-slate-800 text-xl">Teoría de Respuesta al Ítem (IRT)</h4>
                              <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Modelos de Rasch & Lord</p>
                          </div>
                      </div>
                      <div className="overflow-x-auto">
                          <table className="w-full text-left">
                              <thead>
                                  <tr className="text-[10px] uppercase tracking-widest text-slate-500 border-b border-slate-300">
                                      <th className="py-2">Módulo Evaluado</th>
                                      <th className="py-2 text-center" title="Índice de Dificultad (p = Aciertos / Total)">Dif. ($p$)</th>
                                      <th className="py-2 text-center" title="Índice de Discriminación (Top 27% - Bottom 27%)">Discrim. ($D$)</th>
                                  </tr>
                              </thead>
                              <tbody className="text-sm font-bold text-slate-700">
                                  <tr className="border-b border-slate-100">
                                      <td className="py-3 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> Hoja 1: Teoría</td>
                                      <td className="py-3 text-center">{metrics.irt?.p1}</td>
                                      <td className="py-3 text-center text-emerald-600">{metrics.irt?.d1}</td>
                                  </tr>
                                  <tr className="border-b border-slate-100">
                                      <td className="py-3 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-500"></div> Hoja 2: Fuerza Neta</td>
                                      <td className="py-3 text-center">{metrics.irt?.p2}</td>
                                      <td className="py-3 text-center text-blue-600">{metrics.irt?.d2}</td>
                                  </tr>
                                  <tr>
                                      <td className="py-3 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-violet-500"></div> Hoja 3: C. Anillo</td>
                                      <td className="py-3 text-center">{metrics.irt?.p3}</td>
                                      <td className="py-3 text-center text-violet-600">{metrics.irt?.d3}</td>
                                  </tr>
                              </tbody>
                          </table>
                      </div>
                      <p className="text-xs text-slate-500 mt-4 leading-relaxed">
                          * Un $p$ cercano a 1.0 indica un ítem muy fácil. Un $D$ alto ($> 0.3$) indica que la hoja discrimina correctamente entre los estudiantes de alto y bajo rendimiento.
                      </p>
                  </div>

                  {/* Early Warning System & Scatter */}
                  <div className="flex flex-col gap-6">
                      <div className="bg-slate-50 p-6 rounded-2xl border-2 border-slate-200 shadow-inner">
                          <div className="flex items-center gap-3 mb-4">
                              <PieChart className="text-orange-600" size={28} />
                              <div>
                                  <h4 className="font-black text-slate-800 text-xl">Sistema de Alerta Temprana (EWS)</h4>
                                  <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">K-Means Clustering</p>
                              </div>
                          </div>
                          <div className="flex flex-wrap gap-4">
                              <div className="bg-white px-4 py-3 rounded-xl border border-slate-200 shadow-sm flex-1 text-center">
                                  <div className="text-2xl font-black text-emerald-600">{metrics.clusters?.engaged}</div>
                                  <div className="text-[10px] font-bold text-slate-500 uppercase">Óptimos</div>
                              </div>
                              <div className="bg-white px-4 py-3 rounded-xl border border-slate-200 shadow-sm flex-1 text-center">
                                  <div className="text-2xl font-black text-amber-600">{metrics.clusters?.guessing}</div>
                                  <div className="text-[10px] font-bold text-slate-500 uppercase">Adivinando</div>
                              </div>
                              <div className="bg-white px-4 py-3 rounded-xl border border-slate-200 shadow-sm flex-1 text-center">
                                  <div className="text-2xl font-black text-red-600">{metrics.clusters?.struggling}</div>
                                  <div className="text-[10px] font-bold text-slate-500 uppercase">Bloqueados</div>
                              </div>
                          </div>
                      </div>

                  </div>

              </div>
          </MisionBox>

          {/* Legacy Metrics */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div className="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="px-8 py-6 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                <h3 className="font-black text-slate-800 text-xl">Mapeo de Competencias (Rendimiento)</h3>
                <span className="text-xs text-slate-500 font-black uppercase tracking-widest bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm">Identificación de Brechas</span>
              </div>
              <div className="p-6 border-b border-slate-100 bg-white">
                 <h4 className="font-bold text-slate-700 mb-2 uppercase text-sm tracking-widest">Campana de Notas (Frecuencia)</h4>
                 <ScoreHistogram attempts={metrics.attempts} />
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-left">
                  <thead>
                    <tr className="text-xs uppercase tracking-widest text-slate-500 border-b-2 border-slate-100 bg-slate-50">
                      <th className="px-8 py-5 font-black">Misión Evaluada</th>
                      <th className="px-8 py-5 font-black">Nota Media</th>
                      <th className="px-8 py-5 font-black">T. Medio</th>
                      <th className="px-8 py-5 font-black">Estado del Grupo</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-base font-bold bg-white">
                    {metrics.questionMetrics.map(q => (
                      <tr key={q.id} className="hover:bg-slate-50 transition-colors group">
                        <td className="px-8 py-6 text-slate-800 flex items-center gap-4">
                          <div className={`w-3 h-3 rounded-full shadow-inner ${q.status === 'optimal' ? 'bg-emerald-500' : q.status === 'review' ? 'bg-amber-500' : 'bg-red-500'}`}></div>
                          {q.title}
                        </td>
                        <td className="px-8 py-6 font-mono text-slate-600 text-lg">{q.avgScore}</td>
                        <td className="px-8 py-6 font-mono text-slate-500 flex items-center gap-2"><Timer size={16} className="text-slate-400"/> {q.avgTime}s</td>
                        <td className="px-8 py-6">
                          {q.status === 'optimal' ? <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">Óptimo</span> :
                           q.status === 'review' ? <span className="bg-amber-50 text-amber-700 border border-amber-200 px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">Revisar</span> :
                           <span className="bg-red-50 text-red-700 border border-red-200 px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">Crítico</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
              <div className="px-8 py-6 border-b border-slate-200 bg-slate-50">
                <h3 className="font-black text-slate-800 text-xl">Últimos Entregados (Real)</h3>
              </div>
              <div className="p-0 flex-grow bg-white overflow-y-auto max-h-[850px] custom-scrollbar">
                {metrics.attempts.length === 0 ? (
                  <div className="p-8 text-center text-slate-400 font-bold">No hay evaluaciones registradas en Firestore.</div>
                ) : (
                  metrics.attempts.map((a, idx) => (
                    <div key={idx} className="p-8 border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                      <div className="flex justify-between items-center mb-3">
                        <span className="font-black text-slate-800 text-sm break-all" title={a.agent}>{a.agent.length > 20 ? a.agent.substring(0,18)+'...' : a.agent}</span>
                        <span className={`font-mono font-black text-base px-3 py-1.5 rounded-lg border flex-shrink-0 ${a.score > 3.0 ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-red-50 text-red-700 border-red-200 shadow-sm'}`}>{a.score} pts</span>
                      </div>
                      <div className="flex justify-between items-center text-xs text-slate-500 font-bold uppercase tracking-wider mt-2">
                        <span>{a.date}</span>
                        <span className="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-lg border border-slate-200"><Timer size={14}/> {formatTime(a.time)}</span>
                      </div>
                      {a.hesitation > 0 && (
                          <div className="mt-3 text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded-md inline-block">
                              Índice de Duda: {a.hesitation} cambios
                          </div>
                      )}
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* FOOTER Nivel Producción */}
      <footer className="mt-auto py-8 bg-slate-900 border-t border-slate-800 text-center relative z-50">
          <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center px-6 gap-4">
              <div className="text-slate-400 font-medium text-sm">
                  &copy; 2026 <span className="font-black text-white">physics10.easy</span> - Todos los derechos reservados.
              </div>
              
              <div className="flex items-center gap-6">
                  <div className="flex items-center gap-1 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 shadow-inner">
                      {[1,2,3,4,5].map(star => (
                         <Star key={star} size={14} className={`text-orange-400 ${star <= Math.round(ratingStats.average) ? 'fill-current' : ''}`} />
                      ))}
                      <span className="ml-2 font-bold text-orange-100 text-xs">{ratingStats.average}/5 ({ratingStats.count})</span>
                  </div>
                  
                  <div className="flex items-center gap-2 text-xs font-bold text-blue-400">
                      <Eye size={14}/>
                      <span>{realViews} Vistas en tiempo real</span>
                  </div>
              </div>
          </div>
      </footer>

    </div>
  );
}
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
